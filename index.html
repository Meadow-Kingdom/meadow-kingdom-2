function resize() {

  canvas.height = H * dpr;

// AUDIO ENGINE (Procedural — no external files)
// ============================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, vol, dur, type = 'sine') {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playChime(note, vol = 0.3, dur = 0.15) {
  const freq = 261.63 * Math.pow(2, note / 12);
  playTone(freq, vol, dur);
}

function playChimeSequence(notes, interval = 0.12) {
  notes.forEach((n, i) => setTimeout(() => playChime(n, 0.3, 0.2), i * interval * 1000));
}

function playSuccess() { playChimeSequence([0, 4, 7, 12], 0.15); }
function playError() { playTone(200, 0.2, 0.3, 'sawtooth'); }
function playClick() { playChime(12, 0.15, 0.08); }

// ============================================================
// PARTICLE SYSTEM
// ============================================================
let particles = [];

function spawnParticles(x, y, count, opts = {}) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * (opts.spread || 3) * 2,
      vy: (Math.random() - 0.5) * (opts.spread || 3) * 2 - 1,
      life: opts.life || 1,
      maxLife: opts.life || 1,
      color: opts.color || '#FFD700',
      size: opts.size || (2 + Math.random() * 3),
      type: opts.type || 'sparkle',
    });
  }
}

function updateParticles(dt) {
  particles = particles.filter(p => {
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    if (p.type === 'sparkle') p.vy -= dt * 0.5;
    if (p.type === 'fire') { p.vy -= dt * 2; p.size *= 0.98; }
    p.life -= dt;
    return p.life > 0;
  });
}

function drawParticles(ctx) {
  particles.forEach(p => {
    const alpha = Math.min(1, p.life / p.maxLife * 2);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    if (p.type === 'sparkle') {
      const s = p.size * (1 + Math.sin(p.life * 10) * 0.3);
      ctx.beginPath();
      ctx.arc(p.x, p.y, s, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
  });
  ctx.globalAlpha = 1;
}

// ============================================================
// SPEECH BUBBLE SYSTEM
// ============================================================
let activeBubbles = [];

function showSpeechBubble(text, x, y, duration = 3, speaker = null) {
  const bubble = { text, x, y, duration, timer: 0, opacity: 0, speaker };
  activeBubbles.push(bubble);
  return bubble;
}

function updateBubbles(dt) {
  activeBubbles = activeBubbles.filter(b => {
    b.timer += dt;
    if (b.timer < 0.3) b.opacity = b.timer / 0.3;
    else if (b.timer > b.duration - 0.5) b.opacity = Math.max(0, (b.duration - b.timer) / 0.5);
    else b.opacity = 1;
    return b.timer < b.duration;
  });
}

function drawBubbles(ctx) {
  activeBubbles.forEach(b => {
    if (b.opacity <= 0) return;
    ctx.save();
    ctx.globalAlpha = b.opacity;

    const fontSize = Math.max(14, W * 0.022);
    ctx.font = `${fontSize}px Georgia`;
    const lines = wrapText(b.text, W * 0.3);
    const lineH = fontSize * 1.3;
    const textW = Math.max(...lines.map(l => ctx.measureText(l).width));
    const padX = 16, padY = 10;
    const boxW = textW + padX * 2;
    const boxH = lines.length * lineH + padY * 2;
    const bx = Math.max(5, Math.min(W - boxW - 5, b.x - boxW / 2));
    const by = Math.max(5, b.y - boxH - 15);

    // Background
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    roundRect(ctx, bx, by, boxW, boxH, 12);
    ctx.fill();
    ctx.shadowColor = 'rgba(0,0,0,0.1)';
    ctx.shadowBlur = 8;

    // Speaker label
    if (b.speaker) {
      ctx.fillStyle = '#9B59B6';
      ctx.font = `bold ${fontSize * 0.7}px Georgia`;
      ctx.textAlign = 'left';
      ctx.fillText(b.speaker, bx + padX, by + padY + fontSize * 0.6);
    }

    // Text
    ctx.fillStyle = '#3a2a1a';
    ctx.font = `${fontSize}px Georgia`;
    ctx.textAlign = 'left';
    const startY = by + padY + fontSize + (b.speaker ? fontSize * 0.5 : 0);
    lines.forEach((line, i) => {
      ctx.fillText(line, bx + padX, startY + i * lineH);
    });

    // Arrow
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath();
    const arrowX = Math.max(bx + 20, Math.min(bx + boxW - 20, b.x));
    ctx.moveTo(arrowX - 8, by + boxH);
    ctx.lineTo(arrowX, by + boxH + 10);
    ctx.lineTo(arrowX + 8, by + boxH);
    ctx.fill();

    ctx.restore();
  });
}

function wrapText(text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let current = '';
  words.forEach(w => {
    const test = current ? current + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && current) {
      lines.push(current);
      current = w;
    } else {
      current = test;
    }
  });
  if (current) lines.push(current);
  return lines.length ? lines : [''];
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// SAVE / LOAD SYSTEM
// ============================================================
const SAVE_KEY = 'mk2_save';

function saveGame() {
  const data = {
    playerName: player.name,
    playerTitle: player.title,
    playerSkinTone: player.skinTone,
    playerHairColor: player.hairColor,
    playerHairStyle: player.hairStyle,
    playerOutfitColor: player.outfitColor,
    playerAccessory: player.accessory,
    playerClass: player.playerClass,
    playerPet: player.pet,
    playerPetColor: player.petColor,
    playerPetName: player.petName,
    unlockedStages: game.unlockedStages,
    completedLevels: game.completedLevels,
    companions: game.companions,
    inventory: game.inventory,
    premiumUnlocked: game.premiumUnlocked,
    totalTime: game.totalTime,
    puzzlesSolved: game.puzzlesSolved,
    collectiblesFound: game.collectiblesFound,
    earnedStickers: game.earnedStickers,
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    player.name = data.playerName || 'Hero';
    player.title = data.playerTitle || 'Princess';
    player.skinTone = data.playerSkinTone || '#F5C7A1';
    player.hairColor = data.playerHairColor || '#5C3317';
    player.hairStyle = data.playerHairStyle || 0;
    player.outfitColor = data.playerOutfitColor || '#9B59B6';
    player.accessory = data.playerAccessory || 0;
    player.playerClass = data.playerClass || 'royal';
    player.pet = data.playerPet || 'kitten';
    player.petColor = data.playerPetColor || '#FF9F43';
    player.petName = data.playerPetName || 'Whiskers';
    game.unlockedStages = data.unlockedStages || [1];
    game.completedLevels = data.completedLevels || [];
    game.companions = data.companions || ['fox'];
    game.inventory = data.inventory || [];
    game.premiumUnlocked = data.premiumUnlocked || false;
    game.totalTime = data.totalTime || 0;
    game.puzzlesSolved = data.puzzlesSolved || 0;
    game.collectiblesFound = data.collectiblesFound || 0;
    game.earnedStickers = data.earnedStickers || [];
    return true;
  } catch(e) { return false; }
}

    color: def.color,
    accent: def.accent,
    size: def.size,
    ability: def.ability,
    x: player.x + 40,
    y: player.y + 15,
    targetX: player.x + 40,
    targetY: player.y + 15,
    facing: 1,
    animTimer: 0,
    state: 'follow',
    abilityActive: false,
    abilityTimer: 0,
  };
}

function updateCompanions(dt) {
  activeCompanions.forEach(c => {
    c.animTimer += dt;
    const followDist = 35 + activeCompanions.indexOf(c) * 25;
    const dx = (player.x - c.facing * followDist) - c.x;
    const dy = (player.y + 15) - c.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 5) {
      c.x += dx * dt * 3;
      c.y += dy * dt * 3;
      c.facing = dx > 0 ? 1 : -1;
    }
    if (c.abilityActive) {
      c.abilityTimer -= dt;
      if (c.abilityTimer <= 0) c.abilityActive = false;
    }
  });
}

function drawCompanion(ctx, c, time) {
  ctx.save();
  const drawX = c.x - (currentLevel ? currentLevel.scrollX || 0 : 0);
  const drawY = c.y;
  ctx.translate(drawX, drawY);
  ctx.scale(c.facing * c.size, c.size);

  const bob = Math.sin(c.animTimer * 4) * 2;

  if (c.type === 'fox') {
    // Body
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.ellipse(0, bob, 18, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.beginPath();
    ctx.ellipse(14, bob - 6, 10, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    // Ears
    ctx.beginPath();
    ctx.moveTo(18, bob - 14); ctx.lineTo(22, bob - 24); ctx.lineTo(26, bob - 14);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(10, bob - 12); ctx.lineTo(14, bob - 22); ctx.lineTo(18, bob - 12);
    ctx.fill();
    // Tail
    ctx.fillStyle = c.accent;
    const tailWag = Math.sin(c.animTimer * 6) * 0.3;
    ctx.save();
    ctx.translate(-18, bob);
    ctx.rotate(tailWag);
    ctx.beginPath();
    ctx.ellipse(-10, -5, 14, 5, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // White belly
    ctx.fillStyle = '#FFF5E6';
    ctx.beginPath();
    ctx.ellipse(0, bob + 5, 10, 6, 0, 0, Math.PI);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#2C1810';
    ctx.beginPath();
    ctx.arc(18, bob - 8, 2, 0, Math.PI * 2);
    ctx.fill();
    // Nose
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(24, bob - 5, 1.5, 0, Math.PI * 2);
    ctx.fill();
  } else if (c.type === 'unicorn') {
    // Body
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.ellipse(0, bob, 22, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.beginPath();
    ctx.ellipse(18, bob - 10, 10, 9, -0.2, 0, Math.PI * 2);
    ctx.fill();
    // Horn
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.moveTo(22, bob - 18);
    ctx.lineTo(20, bob - 32);
    ctx.lineTo(26, bob - 18);
    ctx.fill();
    // Mane
    ctx.fillStyle = c.accent;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.arc(10 - i * 5, bob - 12 + Math.sin(c.animTimer * 3 + i) * 2, 5, 0, Math.PI * 2);
      ctx.fill();
    }
    // Legs
    ctx.fillStyle = c.color;
    for (let l = 0; l < 4; l++) {
      const lx = -10 + l * 8;
      const legBob = Math.sin(c.animTimer * 5 + l * 1.5) * 2;
      ctx.fillRect(lx - 2, bob + 10 + legBob, 4, 12);
    }
    // Eye
    ctx.fillStyle = '#4A3060';
    ctx.beginPath();
    ctx.arc(22, bob - 11, 2, 0, Math.PI * 2);
    ctx.fill();
  } else if (c.type === 'dragon') {
    // Small cute dragon
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.ellipse(0, bob, 14, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.beginPath();
    ctx.ellipse(12, bob - 6, 8, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    // Wings
    ctx.fillStyle = c.accent;
    const wingFlap = Math.sin(c.animTimer * 5) * 0.3;
    ctx.save();
    ctx.translate(0, bob - 8);
    ctx.rotate(wingFlap - 0.5);
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(-12, -14); ctx.lineTo(-6, -4); ctx.lineTo(-16, -8); ctx.lineTo(-4, 0);
    ctx.fill();
    ctx.restore();
    // Eye
    ctx.fillStyle = c.accent;
    ctx.beginPath();
    ctx.arc(16, bob - 7, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(16, bob - 7, 1.2, 0, Math.PI * 2);
    ctx.fill();
    // Fire breath when ability active
    if (c.abilityActive) {
      for (let f = 0; f < 5; f++) {
        ctx.fillStyle = `rgba(255,${150 + f * 20},0,${0.7 - f * 0.12})`;
        ctx.beginPath();
        ctx.arc(20 + f * 6, bob - 5 + Math.sin(c.animTimer * 10 + f) * 2, 4 - f * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  ctx.restore();
}

// ============================================================
// DRAW PLAYER CHARACTER
// ============================================================
function drawPlayer(ctx, px, py, time, scale = 1) {
  ctx.save();
  ctx.translate(px, py);
  ctx.scale(player.facing * scale, scale);

  const bob = Math.sin(time * 3) * 2;
  const walkBob = Math.sin(player.walkFrame) * 1.5;
  const yOff = bob + walkBob;

  const isBoy = (player.title === 'Prince' || player.title === 'Knight' || player.title === 'Pirate');

  // Legs
  const legSwing = Math.sin(player.walkFrame) * 0.3;
  ctx.fillStyle = player.outfitColor;
  if (!isBoy && player.title !== 'Pirate') {
    // Girl: skirt bottom (wider legs with dress overlap)
    ctx.save();
    ctx.translate(-5, 22 + yOff);
    ctx.rotate(legSwing);
    ctx.fillRect(-2, 0, 4, 14);
    ctx.restore();
    ctx.save();
    ctx.translate(5, 22 + yOff);
    ctx.rotate(-legSwing);
    ctx.fillRect(-2, 0, 4, 14);
    ctx.restore();
  } else {
    // Boy: straight legs
    ctx.save();
    ctx.translate(-5, 20 + yOff);
    ctx.rotate(legSwing);
    ctx.fillRect(-3, 0, 6, 18);
    ctx.restore();
    ctx.save();
    ctx.translate(5, 20 + yOff);
    ctx.rotate(-legSwing);
    ctx.fillRect(-3, 0, 6, 18);
    ctx.restore();
  }

  // Body
  ctx.fillStyle = player.outfitColor;
  if (!isBoy) {
    // Girl: dress shape — narrower shoulders, flared skirt
    ctx.beginPath();
    ctx.moveTo(-10, -5 + yOff);
    ctx.lineTo(10, -5 + yOff);
    ctx.lineTo(10, 10 + yOff);
    ctx.lineTo(14, 24 + yOff);
    ctx.lineTo(-14, 24 + yOff);
    ctx.lineTo(-10, 10 + yOff);
    ctx.closePath();
    ctx.fill();
    // Dress lace trim
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let lx = -13; lx < 14; lx += 4) {
      ctx.moveTo(lx, 23 + yOff);
      ctx.quadraticCurveTo(lx + 2, 20 + yOff, lx + 4, 23 + yOff);
    }
    ctx.stroke();
  } else {
    // Boy: broader shoulders, straight-cut tunic
    ctx.beginPath();
    ctx.moveTo(-13, -5 + yOff);
    ctx.lineTo(13, -5 + yOff);
    ctx.lineTo(13, 22 + yOff);
    ctx.lineTo(-13, 22 + yOff);
    ctx.closePath();
    ctx.fill();
    // Collar notch
    ctx.fillStyle = player.skinTone;
    ctx.beginPath();
    ctx.moveTo(-4, -5 + yOff);
    ctx.lineTo(0, 0 + yOff);
    ctx.lineTo(4, -5 + yOff);
    ctx.fill();
    ctx.fillStyle = player.outfitColor;
  }

  // Belt
  if (player.title === 'Pirate') {
    // Pirate sash
    ctx.fillStyle = '#CC2222';
    ctx.fillRect(-13, 14 + yOff, 26, 4);
    // Buckle
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(-4, 13 + yOff, 8, 6);
    ctx.fillStyle = player.outfitColor;
    ctx.fillRect(-2, 14.5 + yOff, 4, 3);
  } else {
    ctx.fillStyle = '#8B7355';
    ctx.fillRect(-12, 16 + yOff, 24, 3);
  }

  // Arms
  const armSwing = Math.sin(player.walkFrame + 1) * 0.2;
  ctx.fillStyle = player.skinTone;
  ctx.save();
  ctx.translate(-14, 2 + yOff);
  ctx.rotate(armSwing);
  ctx.fillRect(-2, 0, 5, 16);
  ctx.restore();
  ctx.save();
  ctx.translate(14, 2 + yOff);
  ctx.rotate(-armSwing);
  ctx.fillRect(-3, 0, 5, 16);
  ctx.restore();

  // Title-based body details
  if (player.title === 'Knight') {
    // Shoulder pauldrons
    ctx.fillStyle = '#A0A0B0';
    ctx.beginPath();
    ctx.ellipse(-14, 0 + yOff, 6, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(14, 0 + yOff, 6, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (player.title === 'Pirate') {
    // Pirate vest (open front, darker color)
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(-12, -4 + yOff, 5, 18);
    ctx.fillRect(7, -4 + yOff, 5, 18);
    // Skull & crossbones on chest
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(0, 5 + yOff, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(-4, 8 + yOff, 8, 1.5);
  }

  // Class-based held items
  if (player.playerClass === 'explorer') {
    // Compass in right hand
    ctx.fillStyle = '#C0A060';
    ctx.beginPath();
    ctx.arc(16, 16 + yOff, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(16, 16 + yOff, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#E74C3C';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(16, 16 + yOff);
    ctx.lineTo(16, 13 + yOff);
    ctx.stroke();
  } else if (player.playerClass === 'inventor') {
    // Wrench in right hand
    ctx.fillStyle = '#888';
    ctx.fillRect(14, 12 + yOff, 3, 10);
    ctx.beginPath();
    ctx.arc(15.5, 12 + yOff, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = player.outfitColor;
    ctx.beginPath();
    ctx.arc(15.5, 12 + yOff, 1.5, 0, Math.PI * 2);
    ctx.fill();
  } else if (player.playerClass === 'healer') {
    // Glowing green heart near hand
    ctx.fillStyle = '#2ECC71';
    ctx.globalAlpha = 0.6 + Math.sin(time * 4) * 0.3;
    ctx.beginPath();
    ctx.arc(14, 14 + yOff, 3, 0, Math.PI * 2);
    ctx.arc(18, 14 + yOff, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(11, 15.5 + yOff);
    ctx.lineTo(16, 21 + yOff);
    ctx.lineTo(21, 15.5 + yOff);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Head
  ctx.fillStyle = player.skinTone;
  ctx.beginPath();
  ctx.arc(0, -14 + yOff, 14, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  const blink = Math.sin(time * 0.5) > 0.98;
  ctx.fillStyle = '#3a2a1a';
  if (!blink) {
    if (!isBoy) {
      // Girl: bigger, rounder eyes with lashes
      ctx.beginPath();
      ctx.ellipse(-5, -16 + yOff, 3, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(5, -16 + yOff, 3, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Eye shine
      ctx.fillStyle = '#FFF';
      ctx.beginPath(); ctx.arc(-4, -17 + yOff, 1, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(6, -17 + yOff, 1, 0, Math.PI * 2); ctx.fill();
      // Lashes
      ctx.strokeStyle = '#3a2a1a';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(-8, -18 + yOff); ctx.lineTo(-7, -20 + yOff); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-5, -19.5 + yOff); ctx.lineTo(-5, -21.5 + yOff); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(5, -19.5 + yOff); ctx.lineTo(5, -21.5 + yOff); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(8, -18 + yOff); ctx.lineTo(7, -20 + yOff); ctx.stroke();
    } else {
      // Boy: smaller, squarer eyes
      ctx.beginPath();
      ctx.ellipse(-5, -16 + yOff, 2.5, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(5, -16 + yOff, 2.5, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    // Pupils
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(-4.5, -15.5 + yOff, 1.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(5.5, -15.5 + yOff, 1.2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillRect(-7, -16 + yOff, 4, 1);
    ctx.fillRect(3, -16 + yOff, 4, 1);
  }

  // Eyebrows (boys only — thicker brows)
  if (isBoy) {
    ctx.strokeStyle = player.hairColor;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-7, -19 + yOff); ctx.lineTo(-3, -20 + yOff); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3, -20 + yOff); ctx.lineTo(7, -19 + yOff); ctx.stroke();
  }

  // Mouth
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 1.2;
  if (!isBoy) {
    // Girl: rosy lips — slight pink fill + smile
    ctx.fillStyle = 'rgba(220,100,100,0.4)';
    ctx.beginPath();
    ctx.arc(0, -9.5 + yOff, 2.5, 0, Math.PI);
    ctx.fill();
    ctx.stroke();
  } else {
    // Boy: simple smile line
    ctx.beginPath();
    ctx.arc(0, -10 + yOff, 3, 0.1, Math.PI - 0.1);
    ctx.stroke();
  }

  // Hair — separate boy and girl rendering
  ctx.fillStyle = player.hairColor;
  const hs = player.hairStyle;

  if (isBoy) {
    // === BOY HAIR STYLES ===
    // Prince: ['short', 'spiky', 'wavy', 'buzzcut', 'swept', 'long']
    if (hs === 0) { // short — neat cap cut
      ctx.beginPath();
      ctx.arc(0, -18 + yOff, 14, Math.PI, Math.PI * 2);
      ctx.fill();
      // Short sides
      ctx.fillRect(-14, -18 + yOff, 3, 8);
      ctx.fillRect(11, -18 + yOff, 3, 8);
    } else if (hs === 1) { // spiky — upward spikes
      ctx.beginPath();
      ctx.arc(0, -18 + yOff, 14, Math.PI, Math.PI * 2);
      ctx.fill();
      // Spikes pointing up
      const spikes = [-10, -5, 0, 5, 10];
      spikes.forEach(sx => {
        ctx.beginPath();
        ctx.moveTo(sx - 3, -28 + yOff);
        ctx.lineTo(sx, -36 + yOff - Math.abs(sx) * 0.3);
        ctx.lineTo(sx + 3, -28 + yOff);
        ctx.fill();
      });
    } else if (hs === 2) { // wavy — layered wave
      ctx.beginPath();
      ctx.arc(0, -18 + yOff, 14, Math.PI, Math.PI * 2);
      ctx.fill();
      // Wavy fringe
      ctx.beginPath();
      ctx.moveTo(-12, -25 + yOff);
      ctx.quadraticCurveTo(-6, -30 + yOff, 0, -27 + yOff);
      ctx.quadraticCurveTo(6, -31 + yOff, 12, -25 + yOff);
      ctx.lineTo(12, -18 + yOff);
      ctx.lineTo(-12, -18 + yOff);
      ctx.fill();
      // Side volume
      ctx.fillRect(-14, -20 + yOff, 3, 6);
      ctx.fillRect(11, -20 + yOff, 3, 6);
    } else if (hs === 3) { // buzzcut — very short, dotted texture
      ctx.beginPath();
      ctx.arc(0, -18 + yOff, 14, Math.PI * 0.85, Math.PI * 2.15);
      ctx.fill();
      // Buzz texture dots
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      for (let bx = -10; bx <= 10; bx += 4) {
        for (let by = -30; by <= -20; by += 4) {
          if (Math.hypot(bx, by + 18) < 12) {
            ctx.fillRect(bx - 0.5, by + yOff, 1.5, 1.5);
          }
        }
      }
      ctx.fillStyle = player.hairColor;
    } else if (hs === 4) { // swept — side-swept fringe
      ctx.beginPath();
      ctx.arc(0, -18 + yOff, 14, Math.PI, Math.PI * 2);
      ctx.fill();
      // Swept fringe going to one side
      ctx.beginPath();
      ctx.moveTo(-12, -26 + yOff);
      ctx.quadraticCurveTo(-2, -33 + yOff, 12, -26 + yOff);
      ctx.quadraticCurveTo(14, -22 + yOff, 15, -16 + yOff);
      ctx.lineTo(12, -18 + yOff);
      ctx.lineTo(-12, -18 + yOff);
      ctx.fill();
    } else if (hs === 5) { // long — boy long (shoulder length, not princess-long)
      ctx.beginPath();
      ctx.arc(0, -18 + yOff, 14, Math.PI, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(-14, -18 + yOff, 4, 18);
      ctx.fillRect(10, -18 + yOff, 4, 18);
    }
  } else {
    // === GIRL HAIR STYLES ===
    // Princess: ['long', 'short', 'braids', 'curly', 'ponytail', 'mohawk']
    ctx.beginPath();
    ctx.arc(0, -18 + yOff, 14, Math.PI, Math.PI * 2);
    ctx.fill();
    if (hs === 0) { // long — flowing down both sides
      ctx.fillRect(-14, -18 + yOff, 4, 30);
      ctx.fillRect(10, -18 + yOff, 4, 30);
      // Rounded tips
      ctx.beginPath(); ctx.arc(-12, 12 + yOff, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(12, 12 + yOff, 2, 0, Math.PI * 2); ctx.fill();
    } else if (hs === 1) { // short — bob cut
      ctx.fillRect(-14, -18 + yOff, 4, 10);
      ctx.fillRect(10, -18 + yOff, 4, 10);
      // Slight curl at tips
      ctx.beginPath(); ctx.arc(-12, -8 + yOff, 3, 0, Math.PI); ctx.fill();
      ctx.beginPath(); ctx.arc(12, -8 + yOff, 3, 0, Math.PI); ctx.fill();
    } else if (hs === 2) { // braids
      ctx.fillRect(-13, -10 + yOff, 3, 22);
      ctx.fillRect(10, -10 + yOff, 3, 22);
      // Braid bobbles
      ctx.beginPath(); ctx.arc(-11.5, 12 + yOff, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(11.5, 12 + yOff, 3, 0, Math.PI * 2); ctx.fill();
      // Braid bands
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(-13, -2 + yOff, 3, 2);
      ctx.fillRect(10, -2 + yOff, 3, 2);
      ctx.fillStyle = player.hairColor;
    } else if (hs === 3) { // curly — volume curls
      for (let i = 0; i < 8; i++) {
        const angle = Math.PI + (i / 7) * Math.PI;
        ctx.beginPath();
        ctx.arc(Math.cos(angle) * 15, -18 + Math.sin(angle) * 4 + yOff, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (hs === 4) { // ponytail — drapes over shoulder
      ctx.save();
      ctx.translate(10, -22 + yOff);
      ctx.rotate(0.3 + Math.sin(time * 2) * 0.08);
      ctx.beginPath();
      ctx.moveTo(-2, 0);
      ctx.quadraticCurveTo(4, 12, -2, 28);
      ctx.quadraticCurveTo(-4, 28, -6, 12);
      ctx.quadraticCurveTo(-4, 0, -2, 0);
      ctx.fill();
      ctx.beginPath(); ctx.arc(-2, 28, 4, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      // Hair tie
      ctx.fillStyle = '#FF69B4';
      ctx.beginPath(); ctx.arc(10, -22 + yOff, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = player.hairColor;
    } else if (hs === 5) { // mohawk
      for (let i = 0; i < 6; i++) {
        const mx = -8 + i * 3.2;
        ctx.beginPath();
        ctx.moveTo(mx - 2, -28 + yOff);
        ctx.lineTo(mx, -38 + yOff);
        ctx.lineTo(mx + 2, -28 + yOff);
        ctx.fill();
      }
    }
  }

  // Pirate always gets pirate hat + eyepatch regardless of accessory
  if (player.title === 'Pirate') {
    // Pirate hat — wide-brimmed tricorn
    ctx.fillStyle = '#1a1a2a';
    ctx.beginPath();
    ctx.ellipse(0, -27 + yOff, 18, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Hat dome
    ctx.beginPath();
    ctx.ellipse(0, -32 + yOff, 12, 8, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    // Brim folds (tricorn shape)
    ctx.beginPath();
    ctx.moveTo(-18, -27 + yOff);
    ctx.quadraticCurveTo(-12, -34 + yOff, -8, -32 + yOff);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(18, -27 + yOff);
    ctx.quadraticCurveTo(12, -34 + yOff, 8, -32 + yOff);
    ctx.fill();
    // Skull on hat
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(0, -34 + yOff, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(-3, -31 + yOff, 6, 1);
    // Eyepatch
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.ellipse(5, -16 + yOff, 4, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(9, -17 + yOff);
    ctx.quadraticCurveTo(14, -24 + yOff, 8, -28 + yOff);
    ctx.stroke();
  } else if (player.accessory === 0) { // Crown
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.moveTo(-8, -28 + yOff);
    ctx.lineTo(-6, -35 + yOff);
    ctx.lineTo(-2, -30 + yOff);
    ctx.lineTo(0, -37 + yOff);
    ctx.lineTo(2, -30 + yOff);
    ctx.lineTo(6, -35 + yOff);
    ctx.lineTo(8, -28 + yOff);
    ctx.closePath();
    ctx.fill();
  } else if (player.accessory === 4) { // Adventure hat
    ctx.fillStyle = '#8B6914';
    ctx.beginPath();
    ctx.ellipse(0, -27 + yOff, 16, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, -30 + yOff, 10, 6, 0, Math.PI, Math.PI * 2);
    ctx.fill();
  } else if (player.accessory === 5) { // Goggles
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(-5, -16 + yOff, 5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(5, -16 + yOff, 5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, -16 + yOff);
    ctx.lineTo(0, -16 + yOff);
    ctx.stroke();
    ctx.fillStyle = 'rgba(100,200,255,0.3)';
    ctx.beginPath();
    ctx.arc(-5, -16 + yOff, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(5, -16 + yOff, 4, 0, Math.PI * 2);
    ctx.fill();
  } else if (player.accessory === 1) { // Flower Crown
    const flowerColors = ['#FF69B4', '#FFD700', '#FF6B6B', '#FFD700', '#FF69B4'];
    for (let i = 0; i < 5; i++) {
      const angle = Math.PI + (i / 4) * Math.PI;
      const fx = Math.cos(angle) * 10;
      const fy = -26 + Math.sin(angle) * 3 + yOff;
      ctx.fillStyle = flowerColors[i];
      ctx.beginPath();
      ctx.arc(fx, fy, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFE4B5';
      ctx.beginPath();
      ctx.arc(fx, fy, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
    // Vine connecting flowers
    ctx.strokeStyle = '#228B22';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, -20 + yOff, 11, Math.PI, Math.PI * 2);
    ctx.stroke();
  } else if (player.accessory === 2) { // Star Pin
    ctx.fillStyle = '#FFD700';
    const sx = 9, sy = -24 + yOff, sr = 5;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = -Math.PI / 2 + (i * 2 * Math.PI / 5);
      const ai = a + Math.PI / 5;
      ctx.lineTo(sx + Math.cos(a) * sr, sy + Math.sin(a) * sr);
      ctx.lineTo(sx + Math.cos(ai) * sr * 0.4, sy + Math.sin(ai) * sr * 0.4);
    }
    ctx.closePath();
    ctx.fill();
  } else if (player.accessory === 3) { // Bow
    ctx.fillStyle = '#FF69B4';
    // Left wing
    ctx.beginPath();
    ctx.ellipse(2, -28 + yOff, 6, 4, -0.3, 0, Math.PI * 2);
    ctx.fill();
    // Right wing
    ctx.beginPath();
    ctx.ellipse(10, -28 + yOff, 6, 4, 0.3, 0, Math.PI * 2);
    ctx.fill();
    // Center knot
    ctx.fillStyle = '#E91E63';
    ctx.beginPath();
    ctx.arc(6, -28 + yOff, 2.5, 0, Math.PI * 2);
    ctx.fill();
    // Ribbon tails
    ctx.fillStyle = '#FF69B4';
    ctx.beginPath();
    ctx.moveTo(5, -26 + yOff);
    ctx.lineTo(3, -20 + yOff);
    ctx.lineTo(5, -21 + yOff);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(7, -26 + yOff);
    ctx.lineTo(9, -20 + yOff);
    ctx.lineTo(7, -21 + yOff);
    ctx.fill();
  }

  ctx.restore();
}

// ============================================================
// DRAW PLAYER PET
// ============================================================
function drawPlayerPet(ctx, px, py, time, scale = 1) {
  if (!player.pet) return;
  const petDef = charCreate.petOptions.find(p => p.id === player.pet);
  if (!petDef) return;

  const isButterfly = player.pet === 'butterfly';
  const isFrog = player.pet === 'frog';

  // Pet position — follows slightly behind and below player
  const petOffsetX = player.facing * -20 * scale;
  const bobStyle = player.pet === 'bunny' ? Math.abs(Math.sin(time * 4)) * 6 :
                   isButterfly ? Math.sin(time * 3) * 8 :
                   isFrog ? (Math.sin(time * 2) > 0.8 ? -8 : 0) :
                   Math.sin(time * 2.5) * 3;
  const petX = px + petOffsetX;
  const petY = isButterfly ? py - 30 * scale + bobStyle : py + 5 * scale - bobStyle;

  ctx.save();
  // Pet color glow
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = player.petColor;
  ctx.beginPath();
  ctx.arc(petX, petY - 4 * scale, 12 * scale, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Pet emoji
  ctx.font = `${22 * scale}px serif`;
  ctx.textAlign = 'center';
  // Flip pet to face same direction as player
  if (player.facing < 0) {
    ctx.save();
    ctx.translate(petX, petY);
    ctx.scale(-1, 1);
    ctx.fillText(petDef.emoji, 0, 0);
    ctx.restore();
  } else {
    ctx.fillText(petDef.emoji, petX, petY);
  }
  ctx.restore();
}

// ============================================================
// AMBIENT WONDER MOMENTS
// ============================================================
let wonderMoments = [];
let wonderTimer = 0;

function updateWonderMoments(dt, time) {
  wonderTimer += dt;

  // Spawn new wonder moments randomly
  if (wonderTimer > 4 + Math.random() * 8) {
    wonderTimer = 0;
    const roll = Math.random();

    if (roll < 0.2) {
      // Shooting star
      wonderMoments.push({
        type: 'shootingStar',
        x: Math.random() * W * 0.3,
        y: 20 + Math.random() * 60,
        vx: 3 + Math.random() * 4,
        vy: 1 + Math.random() * 2,
        life: 0, maxLife: 1.5,
        trail: [],
      });
    } else if (roll < 0.5) {
      // Butterfly/fairy drifting across
      wonderMoments.push({
        type: 'fairy',
        x: -20,
        y: 40 + Math.random() * (H * 0.4),
        vx: 0.8 + Math.random() * 1.2,
        life: 0, maxLife: 12,
        color: ['#FF69B4', '#FFD700', '#87CEEB', '#DDA0DD', '#98FB98'][Math.floor(Math.random() * 5)],
        wingPhase: Math.random() * Math.PI * 2,
      });
    } else if (roll < 0.65) {
      // Rainbow arc
      wonderMoments.push({
        type: 'rainbow',
        x: W * 0.3 + Math.random() * W * 0.4,
        y: 30 + Math.random() * 40,
        life: 0, maxLife: 6,
        size: 60 + Math.random() * 80,
      });
    } else if (roll < 0.85) {
      // Firefly cluster
      for (let i = 0; i < 3 + Math.floor(Math.random() * 4); i++) {
        wonderMoments.push({
          type: 'firefly',
          x: Math.random() * W,
          y: H * 0.3 + Math.random() * H * 0.4,
          life: 0, maxLife: 5 + Math.random() * 3,
          phase: Math.random() * Math.PI * 2,
          driftX: (Math.random() - 0.5) * 0.5,
          driftY: (Math.random() - 0.5) * 0.3,
        });
      }
    } else {
      // Dandelion seed floating
      wonderMoments.push({
        type: 'dandelion',
        x: -10,
        y: 60 + Math.random() * (H * 0.3),
        vx: 0.3 + Math.random() * 0.6,
        life: 0, maxLife: 15,
        wobble: Math.random() * Math.PI * 2,
      });
    }
  }

  // Update existing moments
  wonderMoments = wonderMoments.filter(m => {
    m.life += dt;
    if (m.life >= m.maxLife) return false;

    if (m.type === 'shootingStar') {
      m.x += m.vx * dt * 60;
      m.y += m.vy * dt * 60;
      m.trail.push({ x: m.x, y: m.y });
      if (m.trail.length > 12) m.trail.shift();
    } else if (m.type === 'fairy') {
      m.x += m.vx * dt * 60;
      m.y += Math.sin(m.life * 2 + m.wingPhase) * 0.5;
      m.wingPhase += dt * 8;
    } else if (m.type === 'firefly') {
      m.x += m.driftX * dt * 60;
      m.y += m.driftY * dt * 60 + Math.sin(m.life * 3 + m.phase) * 0.3;
    } else if (m.type === 'dandelion') {
      m.x += m.vx * dt * 60;
      m.y += Math.sin(m.life * 0.5 + m.wobble) * 0.4;
      m.wobble += dt * 2;
    }
    return true;
  });
}

function drawWonderMoments(ctx, time) {
  for (const m of wonderMoments) {
    const alpha = m.life < 0.5 ? m.life / 0.5 :
                  m.life > m.maxLife - 1 ? (m.maxLife - m.life) : 1;
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, alpha));

    if (m.type === 'shootingStar') {
      // Bright head
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(m.x, m.y, 2, 0, Math.PI * 2);
      ctx.fill();
      // Sparkle trail
      m.trail.forEach((t, i) => {
        const a = i / m.trail.length;
        ctx.globalAlpha = a * alpha * 0.6;
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(t.x, t.y, 1.5 * a, 0, Math.PI * 2);
        ctx.fill();
      });

    } else if (m.type === 'fairy') {
      // Sparkle trail behind fairy
      for (let i = 0; i < 3; i++) {
        const tx = m.x - i * 8 + Math.sin(time * 5 + i) * 3;
        const ty = m.y + Math.cos(time * 4 + i * 2) * 4;
        ctx.globalAlpha = alpha * (0.4 - i * 0.1);
        ctx.fillStyle = m.color;
        ctx.beginPath();
        ctx.arc(tx, ty, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      // Fairy body — tiny glowing sprite
      ctx.globalAlpha = alpha;
      ctx.fillStyle = m.color;
      ctx.beginPath();
      ctx.arc(m.x, m.y, 3, 0, Math.PI * 2);
      ctx.fill();
      // Wings
      const wingA = Math.sin(m.wingPhase) * 0.4;
      ctx.globalAlpha = alpha * 0.5;
      ctx.beginPath();
      ctx.ellipse(m.x - 3, m.y - 2, 5, 3, wingA, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(m.x + 3, m.y - 2, 5, 3, -wingA, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      ctx.globalAlpha = alpha * 0.15;
      ctx.beginPath();
      ctx.arc(m.x, m.y, 10, 0, Math.PI * 2);
      ctx.fill();

    } else if (m.type === 'rainbow') {
      const rainbowAlpha = m.life < 1 ? m.life : m.life > m.maxLife - 2 ? (m.maxLife - m.life) / 2 : 1;
      ctx.globalAlpha = rainbowAlpha * 0.3;
      const colors = ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#4B0082', '#8B00FF'];
      colors.forEach((c, i) => {
        ctx.strokeStyle = c;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(m.x, m.y + m.size * 0.5, m.size - i * 4, Math.PI, 0);
        ctx.stroke();
      });

    } else if (m.type === 'firefly') {
      const glow = 0.3 + Math.sin(m.life * 4 + m.phase) * 0.7;
      ctx.globalAlpha = alpha * Math.max(0, glow);
      ctx.fillStyle = '#FFFF88';
      ctx.beginPath();
      ctx.arc(m.x, m.y, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = alpha * Math.max(0, glow) * 0.3;
      ctx.beginPath();
      ctx.arc(m.x, m.y, 6, 0, Math.PI * 2);
      ctx.fill();

    } else if (m.type === 'dandelion') {
      // Dandelion seed — tiny star/cross shape
      ctx.fillStyle = '#F5F5DC';
      ctx.globalAlpha = alpha * 0.7;
      const dx = m.x;
      const dy = m.y;
      // Seed center
      ctx.beginPath();
      ctx.arc(dx, dy, 1.5, 0, Math.PI * 2);
      ctx.fill();
      // Wispy filaments
      ctx.strokeStyle = '#F5F5DC';
      ctx.lineWidth = 0.5;
      for (let a = 0; a < 6; a++) {
        const angle = (a / 6) * Math.PI * 2 + Math.sin(m.wobble) * 0.3;
        ctx.beginPath();
        ctx.moveTo(dx, dy);
        ctx.lineTo(dx + Math.cos(angle) * 6, dy + Math.sin(angle) * 6);
        ctx.stroke();
      }
    }

    ctx.restore();
  }
}

// ============================================================
// TITLE SCREEN
// ============================================================
function drawTitle(ctx, time) {
  // Gradient sky
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a0a2e');
  grad.addColorStop(0.3, '#2d1b4e');
  grad.addColorStop(0.5, '#5a3d7a');
  grad.addColorStop(0.7, '#c67dbd');
  grad.addColorStop(0.85, '#f0a070');
  grad.addColorStop(1, '#3a6040');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < 40; i++) {
    const sx = ((i * 137.5 + time * 2) % (W + 20)) - 10;
    const sy = ((i * 91.3) % (H * 0.5));
    const twinkle = Math.sin(time * 2 + i) * 0.5 + 0.5;
    ctx.fillStyle = `rgba(255,255,200,${0.3 + twinkle * 0.5})`;
    ctx.beginPath();
    ctx.arc(sx, sy, 1 + twinkle, 0, Math.PI * 2);
    ctx.fill();
  }

  // Moon
  ctx.fillStyle = '#FFF8E7';
  ctx.beginPath();
  ctx.arc(W * 0.8, H * 0.15, 40, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1a0a2e';
  ctx.beginPath();
  ctx.arc(W * 0.8 + 12, H * 0.15 - 5, 35, 0, Math.PI * 2);
  ctx.fill();

  // Title
  titleAlpha = Math.min(1, stateTime / 2);
  ctx.globalAlpha = titleAlpha;

  ctx.fillStyle = '#FFE4C4';
  ctx.textAlign = 'center';
  ctx.font = `bold ${W * 0.06}px Georgia`;
  ctx.fillText('Meadow Kingdom 2', W / 2, H * 0.32);

  ctx.font = `italic ${W * 0.025}px Georgia`;
  ctx.fillStyle = '#E8C8A8';
  ctx.fillText('The Forgotten Realms', W / 2, H * 0.39);

  // Buttons
  if (stateTime > 1.5) {
    const btnAlpha = Math.min(1, (stateTime - 1.5) / 1);
    ctx.globalAlpha = btnAlpha;

    // New Game button
    const btnY = H * 0.52;
    const btnW = W * 0.35;
    const btnH = H * 0.07;
    ctx.fillStyle = 'rgba(155,89,182,0.8)';
    roundRect(ctx, W / 2 - btnW / 2, btnY, btnW, btnH, 10);
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = `${W * 0.025}px Georgia`;
    ctx.fillText('New Adventure', W / 2, btnY + btnH * 0.65);

    // Continue button (if save exists)
    if (loadGame()) {
      const contY = H * 0.62;
      ctx.fillStyle = 'rgba(46,204,113,0.8)';
      roundRect(ctx, W / 2 - btnW / 2, contY, btnW, btnH, 10);
      ctx.fill();
      ctx.fillStyle = '#FFF';
      ctx.fillText('Continue Journey', W / 2, contY + btnH * 0.65);
    }
  }

  ctx.globalAlpha = 1;

  // Animated silhouettes at bottom
  const groundY = H * 0.85;
  ctx.fillStyle = '#2a4a2a';
  ctx.fillRect(0, groundY, W, H - groundY);

  // Trees silhouette
  for (let i = 0; i < 12; i++) {
    const tx = (i / 11) * W;
    const th = 40 + Math.sin(i * 2.3) * 20;
    ctx.fillStyle = '#1a3a1a';
    ctx.beginPath();
    ctx.moveTo(tx, groundY);
    ctx.lineTo(tx - 15, groundY - th);
    ctx.lineTo(tx + 15, groundY - th);
    ctx.closePath();
    ctx.fill();
  }

  // Fireflies
  for (let i = 0; i < 8; i++) {
    const fx = W * 0.2 + Math.sin(time * 0.7 + i * 1.5) * W * 0.3;
    const fy = groundY - 20 - Math.sin(time + i * 2) * 30;
    const glow = Math.sin(time * 3 + i) * 0.5 + 0.5;
    ctx.fillStyle = `rgba(255,255,100,${glow * 0.6})`;
    ctx.beginPath();
    ctx.arc(fx, fy, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(255,255,100,${glow * 0.15})`;
    ctx.beginPath();
    ctx.arc(fx, fy, 10, 0, Math.PI * 2);
    ctx.fill();
  }
}

function handleTitleTap(x, y) {
  if (stateTime < 1.5) {
    ensureAudio();
    return;
  }
  const btnW = W * 0.35;
  const btnH = H * 0.07;
  const btnX = W / 2 - btnW / 2;

  // New Game
  if (x >= btnX && x <= btnX + btnW && y >= H * 0.52 && y <= H * 0.52 + btnH) {
    playClick();
    state = GameState.CHARACTER_CREATE;
    stateTime = 0;
    charCreate.step = 0;
    charCreate.nameInput = '';
    return;
  }

  // Continue
  const contY = H * 0.62;
  if (x >= btnX && x <= btnX + btnW && y >= contY && y <= contY + btnH) {
    if (loadGame()) {
      playClick();
      state = GameState.STAGE_SELECT;
      stateTime = 0;
      return;
    }
  }

  ensureAudio();
}

// ============================================================
// CHARACTER CREATION SCREEN
// ============================================================
function drawCharacterCreate(ctx, time) {
  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#2d1b4e');
  grad.addColorStop(1, '#1a3a3a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  const step = charCreate.step;
  const titleSize = W * 0.03;
  const optSize = W * 0.02;

  // Step titles
  const stepTitles = ['Name Your Hero', 'Choose Your Title', 'Choose Your Class', 'Skin Tone', 'Hair', 'Outfit Color', 'Accessory', 'Choose Your Pet!', 'Name Your Pet', 'Ready for Adventure?'];
  ctx.fillStyle = '#FFE4C4';
  ctx.textAlign = 'center';
  ctx.font = `bold ${titleSize}px Georgia`;
  ctx.fillText(stepTitles[step], W / 2, H * 0.08);

  // Progress dots
  const totalSteps = 10;
  for (let i = 0; i < totalSteps; i++) {
    ctx.fillStyle = i === step ? '#FFD700' : i < step ? '#9B59B6' : 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(W / 2 - (totalSteps * 8 - 8) + i * 16, H * 0.12, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Character preview (right side)
  const previewX = W * 0.75;
  const previewY = H * 0.5;
  drawPlayer(ctx, previewX, previewY, time, 2.5);

  // Pet preview (next to character)
  if (player.pet) {
    const petDef = charCreate.petOptions.find(p => p.id === player.pet);
    if (petDef) {
      const petBob = Math.sin(time * 2.5) * 4;
      const petX = previewX + 50;
      const petY = previewY + 15 + petBob;
      ctx.font = `${W * 0.04}px serif`;
      ctx.textAlign = 'center';
      ctx.fillText(petDef.emoji, petX, petY);
      // Pet color tint circle behind
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = player.petColor;
      ctx.beginPath();
      ctx.arc(petX, petY - 8, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Pet name
      if (player.petName) {
        ctx.fillStyle = '#E8C8A8';
        ctx.font = `${W * 0.011}px Georgia`;
        ctx.fillText(player.petName, petX, petY + 18);
      }
    }
  }

  // Step content (left side)
  const contentX = W * 0.35;
  const contentY = H * 0.25;

  if (step === 0) {
    // Name input
    charCreate.nameCursorTimer += dt;
    charCreate.nameCursor = Math.sin(charCreate.nameCursorTimer * 3) > 0;

    const inputW = W * 0.3;
    const inputH = H * 0.07;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(ctx, contentX - inputW / 2, contentY, inputW, inputH, 8);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    roundRect(ctx, contentX - inputW / 2, contentY, inputW, inputH, 8);
    ctx.stroke();

    ctx.fillStyle = '#FFF';
    ctx.font = `${W * 0.03}px Georgia`;
    ctx.textAlign = 'center';
    const displayName = charCreate.nameInput + (charCreate.nameCursor ? '|' : '');
    ctx.fillText(displayName || '|', contentX, contentY + inputH * 0.65);

    // Virtual keyboard
    drawKeyboard(ctx, contentX, contentY + inputH + H * 0.05);

  } else if (step === 1) {
    // Title selection
    const titles = ['Princess', 'Prince', 'Knight', 'Pirate'];
    titles.forEach((t, i) => {
      const bx = contentX - W * 0.12;
      const by = contentY + i * (H * 0.09);
      const selected = player.title === t;
      ctx.fillStyle = selected ? 'rgba(155,89,182,0.8)' : 'rgba(255,255,255,0.12)';
      roundRect(ctx, bx, by, W * 0.24, H * 0.07, 8);
      ctx.fill();
      ctx.fillStyle = '#FFF';
      ctx.font = `${optSize}px Georgia`;
      ctx.textAlign = 'center';
      ctx.fillText(t, contentX, by + H * 0.045);
    });

  } else if (step === 2) {
    // Class selection
    charCreate.classOptions.forEach((c, i) => {
      const bx = contentX - W * 0.15;
      const by = contentY + i * (H * 0.12);
      const selected = player.playerClass === c.id;
      ctx.fillStyle = selected ? 'rgba(155,89,182,0.8)' : 'rgba(255,255,255,0.12)';
      roundRect(ctx, bx, by, W * 0.3, H * 0.1, 8);
      ctx.fill();
      ctx.fillStyle = '#FFF';
      ctx.font = `bold ${optSize}px Georgia`;
      ctx.textAlign = 'center';
      ctx.fillText(`${c.icon} ${c.name}`, contentX, by + H * 0.04);
      ctx.font = `${optSize * 0.7}px Georgia`;
      ctx.fillStyle = '#E8C8A8';
      ctx.fillText(c.desc, contentX, by + H * 0.07);
    });

  } else if (step === 3) {
    // Skin tone
    const cols = 3;
    charCreate.skinOptions.forEach((color, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const sx = contentX - (cols * 50) / 2 + col * 55;
      const sy = contentY + row * 55;
      const selected = player.skinTone === color;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(sx + 20, sy + 20, selected ? 22 : 18, 0, Math.PI * 2);
      ctx.fill();
      if (selected) {
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 3;
        ctx.stroke();
      }
    });

  } else if (step === 4) {
    // Hair color + style
    ctx.fillStyle = '#E8C8A8';
    ctx.font = `${optSize * 0.8}px Georgia`;
    ctx.textAlign = 'center';
    ctx.fillText('Color', contentX - W * 0.08, contentY - 5);
    ctx.fillText('Style', contentX + W * 0.08, contentY - 5);

    charCreate.hairOptions.forEach((h, i) => {
      const col = i % 4;
      const row = Math.floor(i / 4);
      const hx = contentX - W * 0.15 + col * 40;
      const hy = contentY + 10 + row * 40;
      const selected = player.hairColor === h.color;
      ctx.fillStyle = h.color;
      ctx.beginPath();
      ctx.arc(hx + 15, hy + 15, selected ? 16 : 13, 0, Math.PI * 2);
      ctx.fill();
      if (selected) {
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    });

    // Hair style arrows
    const styles = ['Prince', 'Knight', 'Pirate'].includes(player.title) ? charCreate.hairStylesPrince : charCreate.hairStylesPrincess;
    const arrowY = contentY + 100;
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = `${W * 0.03}px Georgia`;
    ctx.textAlign = 'center';
    ctx.fillText('◀', contentX + W * 0.04, arrowY + 5);
    ctx.fillText('▶', contentX + W * 0.12, arrowY + 5);
    ctx.fillStyle = '#FFF';
    ctx.font = `${optSize}px Georgia`;
    ctx.fillText(styles[charCreate.selectedHairStyle], contentX + W * 0.08, arrowY + 5);

  } else if (step === 5) {
    // Outfit color
    const cols = 5;
    charCreate.outfitOptions.forEach((color, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const ox = contentX - (cols * 45) / 2 + col * 45;
      const oy = contentY + row * 45;
      const selected = player.outfitColor === color;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(ox + 18, oy + 18, selected ? 19 : 15, 0, Math.PI * 2);
      ctx.fill();
      if (selected) {
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 3;
        ctx.stroke();
      }
    });

  } else if (step === 6) {
    // Accessory
    const names = ['Prince', 'Knight', 'Pirate'].includes(player.title) ? charCreate.accessoryNamesPrince : charCreate.accessoryNamesPrincess;
    names.forEach((name, i) => {
      const col = i % 3;
      const row = Math.floor(i / 3);
      const ax = contentX - W * 0.16 + col * (W * 0.11);
      const ay = contentY + row * (H * 0.09);
      const selected = player.accessory === i;
      ctx.fillStyle = selected ? 'rgba(155,89,182,0.8)' : 'rgba(255,255,255,0.12)';
      roundRect(ctx, ax, ay, W * 0.1, H * 0.07, 6);
      ctx.fill();
      ctx.fillStyle = '#FFF';
      ctx.font = `${optSize * 0.8}px Georgia`;
      ctx.textAlign = 'center';
      ctx.fillText(name, ax + W * 0.05, ay + H * 0.045);
    });

  } else if (step === 7) {
    // Pet type selection
    const cols = 2;
    charCreate.petOptions.forEach((p, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const px = contentX - W * 0.16 + col * (W * 0.17);
      const py = contentY + row * (H * 0.11);
      const selected = player.pet === p.id;
      ctx.fillStyle = selected ? 'rgba(155,89,182,0.8)' : 'rgba(255,255,255,0.12)';
      roundRect(ctx, px, py, W * 0.15, H * 0.09, 8);
      ctx.fill();
      // Bouncing emoji
      const bounce = selected ? Math.sin(time * 4) * 3 : 0;
      ctx.font = `${W * 0.025}px serif`;
      ctx.textAlign = 'center';
      ctx.fillText(p.emoji, px + W * 0.03, py + H * 0.04 + bounce);
      ctx.fillStyle = '#FFF';
      ctx.font = `bold ${optSize * 0.85}px Georgia`;
      ctx.fillText(p.name, px + W * 0.1, py + H * 0.035);
      ctx.fillStyle = '#E8C8A8';
      ctx.font = `${optSize * 0.6}px Georgia`;
      ctx.fillText(p.desc, px + W * 0.1, py + H * 0.065);
    });

  } else if (step === 8) {
    // Pet color + name
    ctx.fillStyle = '#E8C8A8';
    ctx.font = `${optSize * 0.8}px Georgia`;
    ctx.textAlign = 'center';
    ctx.fillText('Pet Color', contentX, contentY - 5);

    // Pet color circles
    const colorCols = 5;
    charCreate.petColorOptions.forEach((c, i) => {
      const col = i % colorCols;
      const row = Math.floor(i / colorCols);
      const cx2 = contentX - (colorCols * 40) / 2 + col * 40;
      const cy2 = contentY + 10 + row * 40;
      const selected = player.petColor === c.color;
      ctx.fillStyle = c.color;
      ctx.beginPath();
      ctx.arc(cx2 + 15, cy2 + 15, selected ? 16 : 13, 0, Math.PI * 2);
      ctx.fill();
      if (selected) {
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    });

    // Pet name input
    ctx.fillStyle = '#E8C8A8';
    ctx.font = `${optSize * 0.8}px Georgia`;
    ctx.fillText('Pet Name', contentX, contentY + 100);

    const inputW = W * 0.25;
    const inputH = H * 0.06;
    const inputY = contentY + 110;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(ctx, contentX - inputW / 2, inputY, inputW, inputH, 8);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    roundRect(ctx, contentX - inputW / 2, inputY, inputW, inputH, 8);
    ctx.stroke();

    charCreate.nameCursorTimer += dt;
    const petCursor = Math.sin(charCreate.nameCursorTimer * 3) > 0;
    ctx.fillStyle = '#FFF';
    ctx.font = `${W * 0.025}px Georgia`;
    ctx.textAlign = 'center';
    const petDisplay = (charCreate.petNameInput || player.petName || '') + (petCursor ? '|' : '');
    ctx.fillText(petDisplay || '|', contentX, inputY + inputH * 0.65);

    // Small keyboard for pet name
    drawKeyboard(ctx, contentX, inputY + inputH + H * 0.03);

  } else if (step === 9) {
    // Confirmation
    ctx.fillStyle = '#FFE4C4';
    ctx.font = `${W * 0.025}px Georgia`;
    ctx.textAlign = 'center';
    ctx.fillText(`${player.title} ${player.name}`, contentX, contentY + 10);
    ctx.font = `${optSize}px Georgia`;
    ctx.fillStyle = '#E8C8A8';
    const classOpt = charCreate.classOptions.find(c => c.id === player.playerClass);
    ctx.fillText(`${classOpt.icon} ${classOpt.name}`, contentX, contentY + 40);

    // Pet info
    const petDef = charCreate.petOptions.find(p => p.id === player.pet);
    if (petDef) {
      ctx.fillText(`${petDef.emoji} ${player.petName || petDef.name}`, contentX, contentY + 65);
    }

    const startBtnY = contentY + H * 0.2;
    ctx.fillStyle = 'rgba(46,204,113,0.9)';
    roundRect(ctx, contentX - W * 0.1, startBtnY, W * 0.2, H * 0.08, 10);
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = `bold ${W * 0.025}px Georgia`;
    ctx.fillText('Begin!', contentX, startBtnY + H * 0.055);
  }

  // Navigation arrows
  if (step > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${W * 0.04}px Georgia`;
    ctx.textAlign = 'left';
    ctx.fillText('‹', W * 0.03, H * 0.5);
  }
  if (step < 9 && (step !== 0 || charCreate.nameInput.length > 0)) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${W * 0.04}px Georgia`;
    ctx.textAlign = 'right';
    ctx.fillText('›', W * 0.97, H * 0.5);
  }
}

// Virtual keyboard for mobile
function drawKeyboard(ctx, cx, startY) {
  const rows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
  const keyW = W * 0.035;
  const keyH = H * 0.05;
  const gap = 3;

  rows.forEach((row, ri) => {
    const totalW = row.length * (keyW + gap);
    const sx = cx - totalW / 2;
    const ky = startY + ri * (keyH + gap);

    for (let ci = 0; ci < row.length; ci++) {
      const kx = sx + ci * (keyW + gap);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      roundRect(ctx, kx, ky, keyW, keyH, 4);
      ctx.fill();
      ctx.fillStyle = '#FFF';
      ctx.font = `${keyW * 0.6}px Georgia`;
      ctx.textAlign = 'center';
      ctx.fillText(row[ci], kx + keyW / 2, ky + keyH * 0.7);
    }
  });

  // Space and backspace
  const spaceY = startY + 3 * (keyH + gap);
  const spaceW = W * 0.15;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  roundRect(ctx, cx - spaceW - 5, spaceY, spaceW, keyH, 4);
  ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.font = `${keyW * 0.5}px Georgia`;
  ctx.textAlign = 'center';
  ctx.fillText('SPACE', cx - spaceW / 2 - 5, spaceY + keyH * 0.7);

  ctx.fillStyle = 'rgba(255,100,100,0.3)';
  roundRect(ctx, cx + 5, spaceY, spaceW * 0.7, keyH, 4);
  ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.fillText('⌫', cx + 5 + spaceW * 0.35, spaceY + keyH * 0.7);
}

function handleKeyboardTap(x, y, cx, startY) {
  const rows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
  const keyW = W * 0.035;
  const keyH = H * 0.05;
  const gap = 3;

  for (let ri = 0; ri < rows.length; ri++) {
    const row = rows[ri];
    const totalW = row.length * (keyW + gap);
    const sx = cx - totalW / 2;
    const ky = startY + ri * (keyH + gap);

    for (let ci = 0; ci < row.length; ci++) {
      const kx = sx + ci * (keyW + gap);
      if (x >= kx && x <= kx + keyW && y >= ky && y <= ky + keyH) {
        if (charCreate.nameInput.length < 20) {
          const letter = charCreate.nameInput.length === 0 ? row[ci] : row[ci].toLowerCase();
          charCreate.nameInput += letter;
          player.name = charCreate.nameInput;
          playClick();
        }
        return true;
      }
    }
  }

  // Space
  const spaceY = startY + 3 * (keyH + gap);
  const spaceW = W * 0.15;
  if (x >= cx - spaceW - 5 && x <= cx - 5 && y >= spaceY && y <= spaceY + keyH) {
    if (charCreate.nameInput.length < 20 && charCreate.nameInput.length > 0) {
      charCreate.nameInput += ' ';
      player.name = charCreate.nameInput;
      playClick();
    }
    return true;
  }

  // Backspace
  if (x >= cx + 5 && x <= cx + 5 + spaceW * 0.7 && y >= spaceY && y <= spaceY + keyH) {
    charCreate.nameInput = charCreate.nameInput.slice(0, -1);
    player.name = charCreate.nameInput || 'Hero';
    playClick();
    return true;
  }

  return false;
}

function handleCharCreateTap(x, y) {
  const step = charCreate.step;
  const contentX = W * 0.35;
  const contentY = H * 0.25;
  const optSize = W * 0.02;

  // Left arrow (back)
  if (step > 0 && x < W * 0.1 && y > H * 0.4 && y < H * 0.6) {
    charCreate.step--;
    playClick();
    return;
  }

  // Right arrow (next)
  if (step < 9 && x > W * 0.9 && y > H * 0.4 && y < H * 0.6) {
    if (step === 0 && charCreate.nameInput.length === 0) return;
    // When entering pet name step, init the petNameInput
    if (step === 7) {
      charCreate.petNameInput = player.petName || '';
    }
    charCreate.step++;
    playClick();
    return;
  }

  if (step === 0) {
    // Keyboard
    const inputH = H * 0.07;
    handleKeyboardTap(x, y, contentX, contentY + inputH + H * 0.05);

  } else if (step === 1) {
    const titles = ['Princess', 'Prince', 'Knight', 'Pirate'];
    titles.forEach((t, i) => {
      const by = contentY + i * (H * 0.09);
      if (x >= contentX - W * 0.12 && x <= contentX + W * 0.12 && y >= by && y <= by + H * 0.07) {
        const wasBoy = ['Prince', 'Knight', 'Pirate'].includes(player.title);
        const nowBoy = ['Prince', 'Knight', 'Pirate'].includes(t);
        player.title = t;
        // Reset hair to index 0 when switching between boy/girl to avoid mismatched styles
        if (wasBoy !== nowBoy) {
          player.hairStyle = 0;
          charCreate.selectedHairStyle = 0;
        }
        playClick();
      }
    });

  } else if (step === 2) {
    charCreate.classOptions.forEach((c, i) => {
      const by = contentY + i * (H * 0.12);
      if (x >= contentX - W * 0.15 && x <= contentX + W * 0.15 && y >= by && y <= by + H * 0.1) {
        player.playerClass = c.id;
        playClick();
      }
    });

  } else if (step === 3) {
    const cols = 3;
    charCreate.skinOptions.forEach((color, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const sx = contentX - (cols * 50) / 2 + col * 55 + 20;
      const sy = contentY + row * 55 + 20;
      if (Math.hypot(x - sx, y - sy) < 22) {
        player.skinTone = color;
        playClick();
      }
    });

  } else if (step === 4) {
    // Hair colors
    charCreate.hairOptions.forEach((h, i) => {
      const col = i % 4;
      const row = Math.floor(i / 4);
      const hx = contentX - W * 0.15 + col * 40 + 15;
      const hy = contentY + 10 + row * 40 + 15;
      if (Math.hypot(x - hx, y - hy) < 16) {
        player.hairColor = h.color;
        playClick();
      }
    });

    // Style arrows
    const arrowY = contentY + 95;
    if (x > contentX && x < contentX + W * 0.06 && y > arrowY - 15 && y < arrowY + 15) {
      const styles = ['Prince', 'Knight', 'Pirate'].includes(player.title) ? charCreate.hairStylesPrince : charCreate.hairStylesPrincess;
      charCreate.selectedHairStyle = (charCreate.selectedHairStyle - 1 + styles.length) % styles.length;
      player.hairStyle = charCreate.selectedHairStyle;
      playClick();
    }
    if (x > contentX + W * 0.1 && x < contentX + W * 0.16 && y > arrowY - 15 && y < arrowY + 15) {
      const styles = ['Prince', 'Knight', 'Pirate'].includes(player.title) ? charCreate.hairStylesPrince : charCreate.hairStylesPrincess;
      charCreate.selectedHairStyle = (charCreate.selectedHairStyle + 1) % styles.length;
      player.hairStyle = charCreate.selectedHairStyle;
      playClick();
    }

  } else if (step === 5) {
    const cols = 5;
    charCreate.outfitOptions.forEach((color, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const ox = contentX - (cols * 45) / 2 + col * 45 + 18;
      const oy = contentY + row * 45 + 18;
      if (Math.hypot(x - ox, y - oy) < 19) {
        player.outfitColor = color;
        playClick();
      }
    });

  } else if (step === 6) {
    const names = ['Prince', 'Knight', 'Pirate'].includes(player.title) ? charCreate.accessoryNamesPrince : charCreate.accessoryNamesPrincess;
    names.forEach((name, i) => {
      const col = i % 3;
      const row = Math.floor(i / 3);
      const ax = contentX - W * 0.16 + col * (W * 0.11);
      const ay = contentY + row * (H * 0.09);
      if (x >= ax && x <= ax + W * 0.1 && y >= ay && y <= ay + H * 0.07) {
        player.accessory = i;
        playClick();
      }
    });

  } else if (step === 7) {
    // Pet type selection
    const cols = 2;
    charCreate.petOptions.forEach((p, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const px2 = contentX - W * 0.16 + col * (W * 0.17);
      const py2 = contentY + row * (H * 0.11);
      if (x >= px2 && x <= px2 + W * 0.15 && y >= py2 && y <= py2 + H * 0.09) {
        player.pet = p.id;
        player.petColor = p.defaultColor;
        player.petName = p.name;
        charCreate.petNameInput = p.name;
        playClick();
      }
    });

  } else if (step === 8) {
    // Pet color
    const colorCols = 5;
    charCreate.petColorOptions.forEach((c, i) => {
      const col = i % colorCols;
      const row = Math.floor(i / colorCols);
      const cx2 = contentX - (colorCols * 40) / 2 + col * 40 + 15;
      const cy2 = contentY + 10 + row * 40 + 15;
      if (Math.hypot(x - cx2, y - cy2) < 16) {
        player.petColor = c.color;
        playClick();
      }
    });

    // Pet name keyboard
    const inputH = H * 0.06;
    const inputY = contentY + 110;
    const kbResult = handlePetKeyboardTap(x, y, contentX, inputY + inputH + H * 0.03);

  } else if (step === 9) {
    const startBtnY = contentY + H * 0.2;
    if (x >= contentX - W * 0.1 && x <= contentX + W * 0.1 && y >= startBtnY && y <= startBtnY + H * 0.08) {
      playSuccess();
      game.unlockedStages = [1];
      game.completedLevels = [];
      game.companions = ['fox'];
      game.inventory = [];
      game.premiumUnlocked = false;
      saveGame();
      state = GameState.STAGE_SELECT;
      stateTime = 0;
    }
  }
}

// Pet name keyboard handler (reuses keyboard layout)
function handlePetKeyboardTap(x, y, cx, startY) {
  const rows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
  const keyW = W * 0.035;
  const keyH = H * 0.05;
  const gap = 3;

  for (let ri = 0; ri < rows.length; ri++) {
    const row = rows[ri];
    const totalW = row.length * (keyW + gap);
    const sx = cx - totalW / 2;
    const ky = startY + ri * (keyH + gap);
    for (let ci = 0; ci < row.length; ci++) {
      const kx = sx + ci * (keyW + gap);
      if (x >= kx && x <= kx + keyW && y >= ky && y <= ky + keyH) {
        if (charCreate.petNameInput.length < 15) {
          const letter = charCreate.petNameInput.length === 0 ? row[ci] : row[ci].toLowerCase();
          charCreate.petNameInput += letter;
          player.petName = charCreate.petNameInput;
          playClick();
        }
        return true;
      }
    }
  }

  const spaceY = startY + 3 * (keyH + gap);
  const spaceW = W * 0.15;
  if (x >= cx - spaceW - 5 && x <= cx - 5 && y >= spaceY && y <= spaceY + keyH) {
    if (charCreate.petNameInput.length < 15 && charCreate.petNameInput.length > 0) {
      charCreate.petNameInput += ' ';
      player.petName = charCreate.petNameInput;
      playClick();
    }
    return true;
  }
  if (x >= cx + 5 && x <= cx + 5 + spaceW * 0.7 && y >= spaceY && y <= spaceY + keyH) {
    charCreate.petNameInput = charCreate.petNameInput.slice(0, -1);
    player.petName = charCreate.petNameInput || 'Pet';
    playClick();
    return true;
  }
  return false;
}

// ============================================================
// STAGE SELECT SCREEN
// ============================================================
let stageSelectScroll = 0;
let stageSelectTargetScroll = 0;

function drawStageSelect(ctx, time) {
  // Background — world map style
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a2a3a');
  grad.addColorStop(1, '#2a3a2a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.fillStyle = '#FFE4C4';
  ctx.textAlign = 'center';
  ctx.font = `bold ${W * 0.035}px Georgia`;
  ctx.fillText('The Forgotten Realms', W / 2, H * 0.06);

  // Stage cards
  const cardW = W * 0.38;
  const cardH = H * 0.2;
  const gap = H * 0.03;
  const cols = Math.max(1, Math.floor((W - 40) / (cardW + 20)));
  const startX = (W - cols * (cardW + 20) + 20) / 2;

  // Smooth scroll
  stageSelectScroll += (stageSelectTargetScroll - stageSelectScroll) * dt * 8;

  for (let i = 1; i < STAGES.length; i++) {
    const s = STAGES[i];
    const col = (i - 1) % cols;
    const row = Math.floor((i - 1) / cols);
    const cx = startX + col * (cardW + 20);
    const cy = H * 0.1 + row * (cardH + gap) - stageSelectScroll;

    if (cy + cardH < 0 || cy > H) continue;

    const unlocked = game.unlockedStages.includes(s.id);
    const needsPremium = !s.free && !game.premiumUnlocked;
    const completed = s.levels.every(l => game.completedLevels.includes(l.id));

    // Card background
    if (unlocked && !needsPremium) {
      const cGrad = ctx.createLinearGradient(cx, cy, cx, cy + cardH);
      cGrad.addColorStop(0, s.color1);
      cGrad.addColorStop(1, s.color2);
      ctx.fillStyle = cGrad;
    } else {
      ctx.fillStyle = 'rgba(50,50,50,0.8)';
    }
    roundRect(ctx, cx, cy, cardW, cardH, 12);
    ctx.fill();

    // Border
    if (completed) {
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 3;
      roundRect(ctx, cx, cy, cardW, cardH, 12);
      ctx.stroke();
    }

    // Stage info
    ctx.textAlign = 'left';
    ctx.fillStyle = unlocked && !needsPremium ? '#FFE4C4' : '#666';
    ctx.font = `bold ${W * 0.02}px Georgia`;
    ctx.fillText(`${s.icon} Stage ${s.id}`, cx + 15, cy + 25);
    ctx.font = `${W * 0.018}px Georgia`;
    ctx.fillText(s.name, cx + 15, cy + 48);
    ctx.font = `${W * 0.013}px Georgia`;
    ctx.fillStyle = unlocked && !needsPremium ? '#C8A8E8' : '#555';
    ctx.fillText(s.description, cx + 15, cy + 68);

    // Level dots
    const dotY = cy + cardH - 25;
    s.levels.forEach((l, li) => {
      const dotX = cx + 15 + li * 20;
      const levelDone = game.completedLevels.includes(l.id);
      ctx.fillStyle = levelDone ? '#FFD700' : unlocked ? 'rgba(255,255,255,0.3)' : 'rgba(100,100,100,0.3)';
      ctx.beginPath();
      ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
      ctx.fill();
    });

    // Lock icon for premium
    if (needsPremium) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = `${W * 0.04}px Georgia`;
      ctx.textAlign = 'center';
      ctx.fillText('🔒', cx + cardW / 2, cy + cardH / 2 + 10);
      ctx.font = `${W * 0.012}px Georgia`;
      ctx.fillText('$4.99 to unlock', cx + cardW / 2, cy + cardH / 2 + 35);
    }
  }

  // Stats bar at bottom
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, H - 40, W, 40);
  ctx.fillStyle = '#E8C8A8';
  ctx.font = `${W * 0.013}px Georgia`;
  ctx.textAlign = 'left';
  ctx.fillText(`${player.title} ${player.name}`, 15, H - 15);
  ctx.textAlign = 'center';
  ctx.fillText(`Levels: ${game.completedLevels.length}/${TOTAL_LEVELS}`, W / 2, H - 15);
  ctx.textAlign = 'right';
  ctx.fillText(`Puzzles: ${game.puzzlesSolved}`, W - 15, H - 15);

  // Sticker book button (top-right)
  ctx.fillStyle = 'rgba(155,89,182,0.7)';
  roundRect(ctx, W - 90, 8, 80, 32, 8);
  ctx.fill();
  ctx.fillStyle = '#FFE4C4';
  ctx.font = `${W * 0.015}px Georgia`;
  ctx.textAlign = 'center';
  ctx.fillText(`📖 ${game.earnedStickers.length}/${STICKER_DEFS.length}`, W - 50, 30);
}

function handleStageSelectTap(x, y) {
  // Sticker book button
  if (x >= W - 90 && x <= W - 10 && y >= 8 && y <= 40) {
    playClick();
    state = GameState.STICKER_BOOK;
    stateTime = 0;
    return;
  }

  const cardW = W * 0.38;
  const cardH = H * 0.2;
  const gap = H * 0.03;
  const cols = Math.max(1, Math.floor((W - 40) / (cardW + 20)));
  const startX = (W - cols * (cardW + 20) + 20) / 2;

  for (let i = 1; i < STAGES.length; i++) {
    const s = STAGES[i];
    const col = (i - 1) % cols;
    const row = Math.floor((i - 1) / cols);
    const cx = startX + col * (cardW + 20);
    const cy = H * 0.1 + row * (cardH + gap) - stageSelectScroll;

    if (x >= cx && x <= cx + cardW && y >= cy && y <= cy + cardH) {
      const unlocked = game.unlockedStages.includes(s.id);
      const needsPremium = !s.free && !game.premiumUnlocked;

      if (needsPremium) {
        // Show parent gate
        playClick();
        state = GameState.PARENT_GATE;
        stateTime = 0;
        return;
      }

      if (unlocked) {
        playClick();
        game.currentStage = s.id;
        state = GameState.LEVEL_SELECT;
        stateTime = 0;
        return;
      }
    }
  }
}

function handleStageSelectScroll(dy) {
  const cardH = H * 0.2;
  const gap = H * 0.03;
  const cols = Math.max(1, Math.floor((W - 40) / ((W * 0.38) + 20)));
  const totalRows = Math.ceil((STAGES.length - 1) / cols);
  const maxScroll = Math.max(0, totalRows * (cardH + gap) - H * 0.8);
  stageSelectTargetScroll = Math.max(0, Math.min(maxScroll, stageSelectTargetScroll + dy));
}

// ============================================================
// LEVEL SELECT SCREEN
// ============================================================
function drawLevelSelect(ctx, time) {
  const stg = STAGES[game.currentStage];
  if (!stg) return;

  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, stg.color1);
  grad.addColorStop(1, stg.color2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Back button
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  roundRect(ctx, 10, 10, 80, 35, 8);
  ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.font = `${W * 0.018}px Georgia`;
  ctx.textAlign = 'center';
  ctx.fillText('‹ Back', 50, 33);

  // Stage title
  ctx.fillStyle = '#FFE4C4';
  ctx.font = `bold ${W * 0.035}px Georgia`;
  ctx.textAlign = 'center';
  ctx.fillText(`${stg.icon} ${stg.name}`, W / 2, H * 0.1);

  // Level path (curved line with nodes)
  const levels = stg.levels;
  const pathPoints = [];

  levels.forEach((l, i) => {
    const t = (i + 0.5) / levels.length;
    const px = W * 0.2 + Math.sin(i * 1.8) * W * 0.15 + t * W * 0.3;
    const py = H * 0.2 + t * H * 0.6;
    pathPoints.push({ x: px, y: py, level: l, index: i });
  });

  // Draw path line
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 4;
  ctx.setLineDash([8, 8]);
  ctx.beginPath();
  pathPoints.forEach((p, i) => {
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  });
  ctx.stroke();
  ctx.setLineDash([]);

  // Draw level nodes
  pathPoints.forEach((p, i) => {
    const completed = game.completedLevels.includes(p.level.id);
    const prevCompleted = i === 0 || game.completedLevels.includes(levels[i - 1].id);
    const playable = i === 0 || prevCompleted;

    // Node circle
    const nodeR = 28;
    if (completed) {
      ctx.fillStyle = '#FFD700';
    } else if (playable) {
      const pulse = Math.sin(time * 3) * 0.2 + 0.8;
      ctx.fillStyle = `rgba(155,89,182,${pulse})`;
    } else {
      ctx.fillStyle = 'rgba(100,100,100,0.5)';
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, nodeR, 0, Math.PI * 2);
    ctx.fill();

    // Level number
    ctx.fillStyle = '#FFF';
    ctx.font = `bold ${W * 0.02}px Georgia`;
    ctx.textAlign = 'center';
    ctx.fillText(i + 1, p.x, p.y + 7);

    // Level name
    ctx.fillStyle = playable ? '#FFE4C4' : '#666';
    ctx.font = `${W * 0.014}px Georgia`;
    ctx.fillText(p.level.name, p.x, p.y + nodeR + 18);

    // Mode indicator
    ctx.fillStyle = playable ? '#C8A8E8' : '#555';
    ctx.font = `${W * 0.01}px Georgia`;
    ctx.fillText(p.level.mode === LevelMode.SIDESCROLL ? '→ Side-scroll' : '⬡ Explore', p.x, p.y + nodeR + 34);

    // Checkmark for completed
    if (completed) {
      ctx.fillStyle = '#2ECC71';
      ctx.font = `${W * 0.02}px Georgia`;
      ctx.fillText('✓', p.x + nodeR + 5, p.y + 5);
    }

    // Lock for unplayable
    if (!playable) {
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = `${W * 0.018}px Georgia`;
      ctx.fillText('🔒', p.x, p.y + 5);
    }
  });
}

function handleLevelSelectTap(x, y) {
  // Back button
  if (x >= 10 && x <= 90 && y >= 10 && y <= 45) {
    playClick();
    state = GameState.STAGE_SELECT;
    stateTime = 0;
    return;
  }

  const stg = STAGES[game.currentStage];
  if (!stg) return;

  const levels = stg.levels;
  levels.forEach((l, i) => {
    const t = (i + 0.5) / levels.length;
    const px = W * 0.2 + Math.sin(i * 1.8) * W * 0.15 + t * W * 0.3;
    const py = H * 0.2 + t * H * 0.6;

    if (Math.hypot(x - px, y - py) < 35) {
      const prevCompleted = i === 0 || game.completedLevels.includes(levels[i - 1].id);
      if (i === 0 || prevCompleted) {
        playClick();
        game.currentLevel = i;
        startLevel(stg.id, i);
      }
    }
  });
}

// ============================================================
// LEVEL ENGINE — SIDE-SCROLL MODE
// ============================================================
function startLevel(stageId, levelIndex) {
  const stg = STAGES[stageId];
  const levelDef = stg.levels[levelIndex];

  // Set up companions
  activeCompanions = [];
  if (stg.companion && game.companions.includes(stg.companion)) {
    activeCompanions.push(initCompanion(stg.companion));
  }

  currentLevel = {
    stageId,
    levelIndex,
    def: levelDef,
    mode: levelDef.mode,
    scrollX: 0,
    targetScrollX: 0,
    worldWidth: levelDef.worldWidth || 4000,
    gridW: levelDef.gridW || 20,
    gridH: levelDef.gridH || 15,
    tileSize: 0,
    sceneStep: 0,
    stepTimer: 0,
    puzzles: [],
    activePuzzle: null,
    objects: [],
    triggers: [],
    solved: [],
    inventory: [],
    hintTimer: 0,
    showingHint: false,
    complete: false,
    // Top-down camera
    camX: 0, camY: 0,
    // Tiles (for top-down)
    tiles: [],
    // Decorations
    decorations: [],
    // Background layers for parallax
    bgLayers: [],
    initialized: false,
  };

  // Initialize level content
  initLevelContent(stageId, levelIndex);

  player.x = 80;
  player.y = H * GROUND - 5;
  player.targetX = player.x;
  player.targetY = player.y;
  player.facing = 1;
  player.walkFrame = 0;

  state = GameState.PLAYING;
  stateTime = 0;

  // Track level start time for speed stickers
  game.levelStartTime = game.totalTime;

  // Start ambient audio for this stage
  ensureAudio();
  startAmbient(stageId);

  // Stage intro dialogue on first level
  if (levelIndex === 0) showStageIntro(stageId);
}

// ============================================================
// TOP-DOWN LEVEL GENERATION
// ============================================================
function initTopDownLevel(stageId, levelIndex) {
  const lvl = currentLevel;
  lvl.tileSize = Math.min(W / 15, H / 11);

  // Generate tile grid
  lvl.tiles = [];
  for (let y = 0; y < lvl.gridH; y++) {
    lvl.tiles[y] = [];
    for (let x = 0; x < lvl.gridW; x++) {
      // Border walls
      if (x === 0 || y === 0 || x === lvl.gridW - 1 || y === lvl.gridH - 1) {
        lvl.tiles[y][x] = { type: 'wall', color: '#3a3a4a' };
      } else {
        lvl.tiles[y][x] = { type: 'floor', color: '#4a5a4a' };
      }
    }
  }

  // Add rooms and corridors based on stage
  generateTopDownLayout(stageId, levelIndex);

  // Player start position
  player.gridX = 2;
  player.gridY = Math.floor(lvl.gridH / 2);
  player.x = player.gridX * lvl.tileSize + lvl.tileSize / 2;
  player.y = player.gridY * lvl.tileSize + lvl.tileSize / 2;
  player.targetX = player.x;
  player.targetY = player.y;

  // Generate puzzles
  generateLevelPuzzles(stageId, levelIndex);

function generateTopDownLayout(stageId, levelIndex) {
  const lvl = currentLevel;
  const gw = lvl.gridW;
  const gh = lvl.gridH;

  // Simple room-corridor generator
  const rooms = [];
  const numRooms = 4 + Math.floor(Math.random() * 3);

  for (let r = 0; r < numRooms; r++) {
    const rw = 4 + Math.floor(Math.random() * 5);
    const rh = 3 + Math.floor(Math.random() * 4);
    const rx = 2 + Math.floor(Math.random() * (gw - rw - 4));
    const ry = 2 + Math.floor(Math.random() * (gh - rh - 4));

    // Check overlap
    let overlaps = false;
    for (const existing of rooms) {
      if (rx < existing.x + existing.w + 1 && rx + rw + 1 > existing.x &&
          ry < existing.y + existing.h + 1 && ry + rh + 1 > existing.y) {
        overlaps = true;
        break;
      }
    }
    if (overlaps) continue;

    rooms.push({ x: rx, y: ry, w: rw, h: rh });

    // Carve room
    for (let y = ry; y < ry + rh; y++) {
      for (let x = rx; x < rx + rw; x++) {
        if (y >= 0 && y < gh && x >= 0 && x < gw) {
          const stageColors = {
            1: '#5a6a4a', 2: '#2a2a4a', 3: '#4a5a6a',
            4: '#5a4a3a', 5: '#6a5a4a', 6: '#4a5a6a',
            7: '#2a4a5a', 8: '#2a2a3a', 9: '#4a3a4a',
            10: '#3a3a4a', 11: '#4a5a4a', 12: '#5a4a5a',
          };
          lvl.tiles[y][x] = {
            type: 'floor',
            color: stageColors[stageId] || '#4a5a4a',
            room: rooms.length - 1,
          };
        }
      }
    }
  }

  // Connect rooms with corridors
  for (let i = 1; i < rooms.length; i++) {
    const a = rooms[i - 1];
    const b = rooms[i];
    const ax = Math.floor(a.x + a.w / 2);
    const ay = Math.floor(a.y + a.h / 2);
    const bx = Math.floor(b.x + b.w / 2);
    const by = Math.floor(b.y + b.h / 2);

    // Horizontal then vertical
    for (let x = Math.min(ax, bx); x <= Math.max(ax, bx); x++) {
      if (ay >= 0 && ay < gh && x >= 0 && x < gw) {
        lvl.tiles[ay][x] = { type: 'floor', color: '#4a4a4a', corridor: true };
      }
    }
    for (let y = Math.min(ay, by); y <= Math.max(ay, by); y++) {
      if (y >= 0 && y < gh && bx >= 0 && bx < gw) {
        lvl.tiles[y][bx] = { type: 'floor', color: '#4a4a4a', corridor: true };
      }
    }
  }

  // Store rooms for puzzle placement
  lvl.rooms = rooms;
}

  const dialogues = stageDialogues[stageId];
  if (!dialogues || !dialogues[levelIndex]) return;

  const lines = dialogues[levelIndex];
  const numEvents = Math.min(lines.length, 2); // max 2 animal encounters per level

  for (let i = 0; i < numEvents; i++) {
    const animal = animals[i % animals.length];
    const positionFraction = (i + 1) / (numEvents + 1); // distribute evenly

    if (lvl.mode === LevelMode.SIDESCROLL) {
      lvl.storyEvents.push({
        x: lvl.worldWidth * (0.1 + positionFraction * 0.3), // early in the level, before puzzles
        triggerDist: 120,
        triggered: false,
        animal: animal,
        dialogue: lines[i],
        bobTimer: Math.random() * Math.PI * 2,
      });
    } else if (lvl.rooms && lvl.rooms.length > 0) {
      // Place in rooms for top-down levels
      const room = lvl.rooms[Math.min(i, lvl.rooms.length - 1)];
      const ts = lvl.tileSize || 40;
      lvl.storyEvents.push({
        gridX: room.x + 1 + Math.floor(Math.random() * Math.max(1, room.w - 2)),
        gridY: room.y + 1 + Math.floor(Math.random() * Math.max(1, room.h - 2)),
        x: 0, y: 0, // computed from grid
        triggerDist: ts * 2,
        triggered: false,
        animal: animal,
        dialogue: lines[i],
        bobTimer: Math.random() * Math.PI * 2,
      });
      // Compute pixel position
      const evt = lvl.storyEvents[lvl.storyEvents.length - 1];
      evt.x = evt.gridX * ts + ts / 2;
      evt.y = evt.gridY * ts + ts / 2;
    }
  }
}
