  return false;
}

// ============================================================
// TIME-TOGGLE PUZZLE — Stage 11: Garden of Time
// ============================================================
function drawTimePuzzle(ctx, p, cx, cy, time) {
  const d = p.data;
  const cellSize = 38;
  const gridW = d.past[0].length;
  const gridH = d.past.length;
  const startX = cx - (gridW * cellSize) / 2;
  const startY = cy - (gridH * cellSize) / 2 - 20;

  const isPresent = d.timeline === 'present';
  const grid = isPresent ? d.present : d.past;

  // Background with time-appropriate color
  ctx.fillStyle = isPresent ? 'rgba(20,60,20,0.9)' : 'rgba(60,40,20,0.9)';
  roundRect(ctx, startX - 20, startY - 50, gridW * cellSize + 40, gridH * cellSize + 100, 12);
  ctx.fill();

  // Era indicator
  ctx.fillStyle = isPresent ? '#4ADE80' : '#DEB887';
  ctx.font = `bold ${W * 0.016}px Georgia`;
  ctx.textAlign = 'center';
  ctx.fillText(isPresent ? '🌿 Present Day' : '🏛️ Ancient Past', cx, startY - 25);

  for (let gy = 0; gy < gridH; gy++) {
    for (let gx = 0; gx < gridW; gx++) {
      const tx = startX + gx * cellSize;
      const ty = startY + gy * cellSize;
      const cell = grid[gy][gx];

      // Tiles
      if (cell === 0) ctx.fillStyle = isPresent ? '#3a5a3a' : '#5a4a3a'; // floor
      else if (cell === 1) ctx.fillStyle = isPresent ? '#2a3a2a' : '#4a3a2a'; // wall
      else if (cell === 2) ctx.fillStyle = '#4488FF'; // water
      else if (cell === 3) ctx.fillStyle = '#8B4513'; // bridge
      else if (cell === 4) ctx.fillStyle = '#228B22'; // tree/plant
      else if (cell === 5) ctx.fillStyle = '#FFD700'; // goal

      ctx.fillRect(tx + 1, ty + 1, cellSize - 2, cellSize - 2);

      if (cell === 5) {
        const glow = Math.sin(time * 3) * 0.3 + 0.7;
        ctx.fillStyle = `rgba(255,215,0,${glow * 0.3})`;
        ctx.beginPath();
        ctx.arc(tx + cellSize / 2, ty + cellSize / 2, cellSize * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Player
  const ppx = startX + d.playerX * cellSize + cellSize / 2;
  const ppy = startY + d.playerY * cellSize + cellSize / 2;
  ctx.fillStyle = '#FF6B6B';
  ctx.beginPath();
  ctx.arc(ppx, ppy, cellSize * 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Time toggle button
  const btnY = startY + gridH * cellSize + 15;
  ctx.fillStyle = isPresent ? '#DEB887' : '#4ADE80';
  roundRect(ctx, cx - 80, btnY, 160, 35, 8);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.font = `bold ${W * 0.013}px Georgia`;
  ctx.fillText(isPresent ? '⏪ Travel to Past' : '⏩ Return to Present', cx, btnY + 23);
}

function handleTimePuzzleTap(p, x, y) {
  const d = p.data;
  const cellSize = 38;
  const gridW = d.past[0].length;
  const gridH = d.past.length;
  const cx = p.x ? p.x - currentLevel.scrollX : W / 2;
  const cy = p.x ? H * 0.4 : H * 0.4;
  const startX = cx - (gridW * cellSize) / 2;
  const startY = cy - (gridH * cellSize) / 2 - 20;

  // Time toggle button
  const btnY = startY + gridH * cellSize + 15;
  if (x >= cx - 80 && x <= cx + 80 && y >= btnY && y <= btnY + 35) {
    d.timeline = d.timeline === 'present' ? 'past' : 'present';
    playChime(d.timeline === 'past' ? 0 : 7, 0.4, 0.3);
    showSpeechBubble(d.timeline === 'past' ? 'The world shifts...' : 'Back to the present!', cx, cy - 100, 2);
    return true;
  }

  // Movement taps
  const grid = d.timeline === 'present' ? d.present : d.past;
  const ppx = startX + d.playerX * cellSize + cellSize / 2;
  const ppy = startY + d.playerY * cellSize + cellSize / 2;
  const dx = x - ppx;
  const dy = y - ppy;

  let moveX = 0, moveY = 0;
  if (Math.abs(dx) > Math.abs(dy)) moveX = dx > 0 ? 1 : -1;
  else moveY = dy > 0 ? 1 : -1;

  const nx = d.playerX + moveX;
  const ny = d.playerY + moveY;
  if (ny >= 0 && ny < gridH && nx >= 0 && nx < gridW) {
    const cell = grid[ny][nx];
    if (cell !== 1 && cell !== 2) { // not wall or water
      d.playerX = nx;
      d.playerY = ny;
      playClick();
      if (cell === 5) solvePuzzle(p); // goal reached
    }
  }
  return true;
}

// ============================================================
// SHADOW PUZZLE — Stage 8: Shadow Forest
// ============================================================
function drawShadowPuzzle(ctx, p, cx, cy, time) {
  const d = p.data;
  const size = 55;
  const gap = 15;

  ctx.fillStyle = 'rgba(10,10,20,0.92)';
  const panelW = W * 0.5;
  const panelH = H * 0.45;
  roundRect(ctx, cx - panelW / 2, cy - panelH / 2, panelW, panelH, 12);
  ctx.fill();

  ctx.fillStyle = '#AAB0CC';
  ctx.font = `bold ${W * 0.016}px Georgia`;
  ctx.textAlign = 'center';
  ctx.fillText('Match the shadow puppet!', cx, cy - panelH / 2 + 30);

  // Target shadow shape
  const targetShape = d.shapes[d.currentTarget];
  ctx.fillStyle = '#1a1a2a';
  ctx.strokeStyle = '#446';
  ctx.lineWidth = 2;
  drawShadowShape(ctx, cx, cy - 50, targetShape, size * 1.5, time);
  ctx.fillStyle = '#888';
  ctx.font = `${W * 0.012}px Georgia`;
  ctx.fillText(targetShape.name, cx, cy - 50 + size * 0.9);

  // Options
  const options = d.options;
  const totalW = options.length * (size + gap) - gap;
  const startX = cx - totalW / 2;
  const optY = cy + 30;

  for (let i = 0; i < options.length; i++) {
    const ox = startX + i * (size + gap);
    const selected = d.selectedOption === i;
    ctx.fillStyle = selected ? 'rgba(100,100,200,0.5)' : 'rgba(30,30,50,0.8)';
    ctx.strokeStyle = selected ? '#88AAFF' : '#334';
    ctx.lineWidth = selected ? 2 : 1;
    roundRect(ctx, ox, optY, size, size, 6);
    ctx.fill();
    roundRect(ctx, ox, optY, size, size, 6);
    ctx.stroke();

    ctx.fillStyle = '#2a2a4a';
    drawShadowShape(ctx, ox + size / 2, optY + size / 2, options[i], size * 0.6, time);
  }

  ctx.fillStyle = '#667';
  ctx.font = `${W * 0.012}px Georgia`;
  ctx.fillText(`${d.matched}/${d.totalToMatch} matched`, cx, optY + size + 25);
}

function drawShadowShape(ctx, x, y, shape, size, time) {
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath();
  if (shape.type === 'circle') {
    ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
  } else if (shape.type === 'triangle') {
    ctx.moveTo(0, -size / 2);
    ctx.lineTo(-size / 2, size / 2);
    ctx.lineTo(size / 2, size / 2);
    ctx.closePath();
  } else if (shape.type === 'star') {
    for (let i = 0; i < 5; i++) {
      const angle = (i * 72 - 90) * Math.PI / 180;
      const innerAngle = ((i * 72 + 36) - 90) * Math.PI / 180;
      if (i === 0) ctx.moveTo(Math.cos(angle) * size / 2, Math.sin(angle) * size / 2);
      else ctx.lineTo(Math.cos(angle) * size / 2, Math.sin(angle) * size / 2);
      ctx.lineTo(Math.cos(innerAngle) * size / 4, Math.sin(innerAngle) * size / 4);
    }
    ctx.closePath();
  } else if (shape.type === 'diamond') {
    ctx.moveTo(0, -size / 2);
    ctx.lineTo(size / 3, 0);
    ctx.lineTo(0, size / 2);
    ctx.lineTo(-size / 3, 0);
    ctx.closePath();
  } else if (shape.type === 'crescent') {
    ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
    ctx.moveTo(size / 4, 0);
    ctx.arc(size / 5, 0, size / 2.5, 0, Math.PI * 2, true);
  } else {
    ctx.rect(-size / 2, -size / 2, size, size);
  }
  ctx.fill();
  ctx.restore();
}

function handleShadowTap(p, x, y) {
  const d = p.data;
  const cx = p.x ? p.x - currentLevel.scrollX : W / 2;
  const cy = p.x ? H * 0.4 : H * 0.4;
  const size = 55;
  const gap = 15;
  const options = d.options;
  const totalW = options.length * (size + gap) - gap;
  const startX = cx - totalW / 2;
  const optY = cy + 30;

  for (let i = 0; i < options.length; i++) {
    const ox = startX + i * (size + gap);
    if (x >= ox && x <= ox + size && y >= optY && y <= optY + size) {
      d.selectedOption = i;
      playClick();

      // Check match
      if (options[i].type === d.shapes[d.currentTarget].type) {
        d.matched++;
        playChime(d.matched * 3, 0.3, 0.2);
        spawnParticles(ox + size / 2, optY + size / 2, 8, { color: '#8888FF', life: 1 });
        if (d.matched >= d.totalToMatch) {
          solvePuzzle(p);
        } else {
          d.currentTarget++;
          d.selectedOption = -1;
          // Shuffle options
          d.options = shuffleArray([...d.allShapes]).slice(0, 4);
        }
      } else {
        d.wrong = true;
        d.wrongTimer = 1;
        d.selectedOption = -1;
        playError();
      }
      return true;
    }
  }
  return false;
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============================================================
// PUZZLE SOLVED
// ============================================================
function solvePuzzle(p) {
  p.solved = true;
  game.puzzlesSolved++;
  playSuccess();
  spawnParticles(W / 2, H / 2, 20, { type: 'sparkle', color: '#FFD700', life: 2, spread: 5 });
  showSpeechBubble('Puzzle solved!', W / 2, H * 0.3, 3);

  // Check for special unlocks
  if (p.id === 'unicorn_rescue') {
    if (!game.companions.includes('unicorn')) {
      game.companions.push('unicorn');
      showSpeechBubble('The unicorn is free! Starlight joins your quest!', W / 2, H * 0.2, 5);
      activeCompanions.push(initCompanion('unicorn'));
    }
  }
  if (p.id === 'crystal_heart') {
    if (!game.companions.includes('dragon')) {
      game.companions.push('dragon');
      showSpeechBubble('A baby dragon appears! Spark wants to help!', W / 2, H * 0.2, 5);
      activeCompanions.push(initCompanion('dragon'));
    }
  }
  if (p.id === 'shadow_boss') {
    if (!game.companions.includes('owl')) {
      game.companions.push('owl');
      showSpeechBubble('A wise owl emerges from the shadows! Sage joins you!', W / 2, H * 0.2, 5);
      activeCompanions.push(initCompanion('owl'));
    }
  }

  const lvl = currentLevel;
  lvl.activePuzzle = null;
  lvl.hintTimer = 0;

  saveGame();
  checkStickerUnlocks();
}

// ============================================================
// LEVEL COMPLETE
// ============================================================
function completeLevel() {
  if (currentLevel.complete) return;

  // Speed stickers
  const levelTime = game.totalTime - game.levelStartTime;
  if (levelTime < 60) earnSticker('speed_60');
  if (levelTime < 30) earnSticker('speed_30');
  currentLevel.complete = true;

  const stg = STAGES[currentLevel.stageId];
  const levelDef = stg.levels[currentLevel.levelIndex];

  if (!game.completedLevels.includes(levelDef.id)) {
    game.completedLevels.push(levelDef.id);
  }

  // Check if stage complete
  const stageComplete = stg.levels.every(l => game.completedLevels.includes(l.id));

  if (stageComplete) {
    // Unlock next stage
    const nextStageId = currentLevel.stageId + 1;
    if (nextStageId < STAGES.length && !game.unlockedStages.includes(nextStageId)) {
      game.unlockedStages.push(nextStageId);
    }
    state = GameState.STAGE_COMPLETE;
  } else {
    state = GameState.LEVEL_COMPLETE;
  }

  stateTime = 0;
  saveGame();
  playSuccess();
  checkStickerUnlocks();
}

// ============================================================
// LEVEL COMPLETE SCREEN
// ============================================================
function drawLevelComplete(ctx, time) {
  // Background dim
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  // Card
  const cardW = W * 0.5;
  const cardH = H * 0.4;
  const cx = W / 2 - cardW / 2;
  const cy = H / 2 - cardH / 2;

  ctx.fillStyle = 'rgba(30,20,50,0.95)';
  roundRect(ctx, cx, cy, cardW, cardH, 20);
  ctx.fill();
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 3;
  roundRect(ctx, cx, cy, cardW, cardH, 20);
  ctx.stroke();

  // Stars
  const stars = 3; // TODO: calculate based on hints used, time, etc
  ctx.fillStyle = '#FFD700';
  ctx.font = `${W * 0.04}px Georgia`;
  ctx.textAlign = 'center';
  for (let i = 0; i < 3; i++) {
    const sx = W / 2 - 50 + i * 50;
    const sy = cy + 50;
    const delay = i * 0.3;
    if (stateTime > delay + 0.5) {
      ctx.fillText(i < stars ? '★' : '☆', sx, sy);
    }

  if (currentLevel) {

    ctx.font = `bold ${W * 0.025}px Georgia`;
    ctx.fillText('Level Complete!', W / 2, cy + 90);
    ctx.font = `${W * 0.018}px Georgia`;
    ctx.fillStyle = '#C8A8E8';
    ctx.fillText(levelDef.name, W / 2, cy + 120);

  if (stateTime > 1.5) {
    const btnY = cy + cardH - 70;

    roundRect(ctx, W / 2 - 80, btnY, 160, 45, 10);
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = `bold ${W * 0.02}px Georgia`;
    ctx.fillText('Continue', W / 2, btnY + 30);
  }
}

function handleLevelCompleteTap(x, y) {
  if (stateTime < 1.5) return;
  const cardH = H * 0.4;
  const cy = H / 2 - cardH / 2;
  const btnY = cy + cardH - 70;

  if (x >= W / 2 - 80 && x <= W / 2 + 80 && y >= btnY && y <= btnY + 45) {
    playClick();
    // Go to next level or back to level select
    const stg = STAGES[currentLevel.stageId];
    if (currentLevel.levelIndex < stg.levels.length - 1) {
      // Start next level
      startLevel(currentLevel.stageId, currentLevel.levelIndex + 1);
    } else {
      state = GameState.LEVEL_SELECT;
      stateTime = 0;
    }
  }
}

      ctx.fillText(`Next: ${nextStg.icon} ${nextStg.name}`, W / 2, cy + cardH - 90);

  }

  if (stateTime > 2) {

function handleStageCompleteTap(x, y) {
  if (stateTime < 2) return;
  const cardH = H * 0.5;
  const cy = H / 2 - cardH / 2;
  const btnY = cy + cardH - 60;

  if (x >= W / 2 - 100 && x <= W / 2 + 100 && y >= btnY && y <= btnY + 45) {
    playClick();
    stopAmbient();

    if (currentLevel && currentLevel.stageId === 24) {

}

function handleParentGateTap(x, y) {
  const cardW = W * 0.45;
  const cardH = H * 0.55;
  const cx = W / 2 - cardW / 2;
  const cy = H / 2 - cardH / 2;

  // Back button (both phases)
  if (y > cy + cardH - 30) {
    playClick();
    state = GameState.STAGE_SELECT;
    stateTime = 0;
    return;
  }

  if (parentGate.mathSolved) {
    // ---- PAYMENT PHASE ----
    // Buy button
    const buyBtnW = 180, buyBtnH = 48;
    const buyBtnX = W / 2 - buyBtnW / 2;
    const buyBtnY = cy + cardH - 120;
    if (x >= buyBtnX && x <= buyBtnX + buyBtnW && y >= buyBtnY && y <= buyBtnY + buyBtnH) {
      playClick();
      // Open Stripe Payment Link — redirects back with ?unlock=success
      window.location.href = STRIPE_PAYMENT_URL;
      return;
    }
  } else {
    // ---- MATH PHASE ----
    const padStartX = W / 2 - 75;
    const padStartY = cy + 220;
    const padBtnW = 45;
    const padBtnH = 38;
    const padGap = 5;

    // Number buttons 1-9
    for (let i = 1; i <= 9; i++) {
      const col = (i - 1) % 3;
      const row = Math.floor((i - 1) / 3);
      const bx = padStartX + col * (padBtnW + padGap);
      const by = padStartY + row * (padBtnH + padGap);
      if (x >= bx && x <= bx + padBtnW && y >= by && y <= by + padBtnH) {
        if (parentGate.input.length < 4) parentGate.input += String(i);
        parentGate.wrong = false;
        playClick();
        return;
      }
    }

    // 0
    const zeroY = padStartY + 3 * (padBtnH + padGap);
    const zeroX = padStartX + padBtnW + padGap;
    if (x >= zeroX && x <= zeroX + padBtnW && y >= zeroY && y <= zeroY + padBtnH) {
      if (parentGate.input.length < 4) parentGate.input += '0';
      parentGate.wrong = false;
      playClick();
      return;
    }

    // Backspace
    const bsX = padStartX + 2 * (padBtnW + padGap);
    if (x >= bsX && x <= bsX + padBtnW && y >= zeroY && y <= zeroY + padBtnH) {
      parentGate.input = parentGate.input.slice(0, -1);
      playClick();
      return;
    }

    // Submit
    if (x >= padStartX && x <= padStartX + padBtnW && y >= zeroY && y <= zeroY + padBtnH) {
      if (parseInt(parentGate.input) === parentGate.answer) {
        // Math correct — show payment screen
        parentGate.mathSolved = true;
        playSuccess();
      } else {
        parentGate.wrong = true;
        parentGate.input = '';
        playError();
      }
      return;
    }
  }
}

// STICKER SYSTEM
// ============================================================
function earnSticker(id) {
  if (game.earnedStickers.includes(id)) return false;
  game.earnedStickers.push(id);
  const def = STICKER_DEFS.find(s => s.id === id);
  if (def) stickerNotifyQueue.push(def);
  saveGame();
  return true;
}

function checkStickerUnlocks() {
  // Stage completions
  for (let i = 1; i <= 24; i++) {
    const stg = STAGES[i];
    if (stg && stg.levels.every(l => game.completedLevels.includes(l.id))) {
      earnSticker('stage_' + i);
    }
  }
  // Puzzle milestones
  if (game.puzzlesSolved >= 1) earnSticker('puzzle_1');
  if (game.puzzlesSolved >= 5) earnSticker('puzzle_5');
  if (game.puzzlesSolved >= 15) earnSticker('puzzle_15');
  if (game.puzzlesSolved >= 30) earnSticker('puzzle_30');
  if (game.puzzlesSolved >= 50) earnSticker('puzzle_50');
  // Collectible milestones
  if (game.collectiblesFound >= 1) earnSticker('collect_1');
  if (game.collectiblesFound >= 5) earnSticker('collect_5');
  if (game.collectiblesFound >= 15) earnSticker('collect_15');
  if (game.collectiblesFound >= 30) earnSticker('collect_30');
  // Companions
  if (game.companions.includes('fox')) earnSticker('comp_fox');
  if (game.companions.includes('unicorn')) earnSticker('comp_unicorn');
  if (game.companions.includes('dragon')) earnSticker('comp_dragon');
  if (game.companions.includes('owl')) earnSticker('comp_owl');
  if (game.companions.length >= 4) earnSticker('comp_all');
  // First level
  if (game.completedLevels.length >= 1) earnSticker('first_level');
  // Free levels complete (stages 1-2, 9 levels)
  const freeLevels = [...STAGES[1].levels, ...STAGES[2].levels].map(l => l.id);
  if (freeLevels.every(id => game.completedLevels.includes(id))) earnSticker('free_done');
  // All levels
  const TOTAL = STAGES.slice(1).reduce((a, s) => a + s.levels.length, 0);
  if (game.completedLevels.length >= TOTAL) earnSticker('all_done');
  // Time played
  if (game.totalTime >= 1800) earnSticker('play_30m');
  if (game.totalTime >= 3600) earnSticker('play_1h');
  // Speed — checked in completeLevel
  // Beat game
  if (STAGES[24] && STAGES[24].levels.every(l => game.completedLevels.includes(l.id))) earnSticker('beat_game');
  // Meta stickers
  if (game.earnedStickers.length >= 10) earnSticker('sticker_10');
  if (game.earnedStickers.length >= 25) earnSticker('sticker_25');
}

function updateStickerNotify(dt) {
  if (stickerNotifyCurrent) {
    stickerNotifyTimer += dt;
    if (stickerNotifyTimer > 3.5) {
      stickerNotifyCurrent = null;
      stickerNotifyTimer = 0;
    }
  } else if (stickerNotifyQueue.length > 0) {
    stickerNotifyCurrent = stickerNotifyQueue.shift();
    stickerNotifyTimer = 0;
    playChimeSequence([0, 4, 7, 12, 16], 0.1);
    spawnParticles(W / 2, H * 0.15, 15, { type: 'sparkle', color: '#FFD700', life: 2, spread: 4 });
  }
}

function drawStickerNotify(ctx) {
  if (!stickerNotifyCurrent) return;
  const s = stickerNotifyCurrent;
  const t = stickerNotifyTimer;
  let alpha = 1;
  if (t < 0.4) alpha = t / 0.4;
  else if (t > 3) alpha = Math.max(0, (3.5 - t) / 0.5);

  const boxW = Math.min(W * 0.7, 300);
  const boxH = 70;
  const bx = W / 2 - boxW / 2;
  const by = 10;
  const scale = t < 0.5 ? 0.8 + 0.4 * Math.sin(t * Math.PI) : 1;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(W / 2, by + boxH / 2);
  ctx.scale(scale, scale);
  ctx.translate(-W / 2, -(by + boxH / 2));

  // Glow
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 15;
  ctx.fillStyle = 'rgba(30,15,50,0.95)';
  roundRect(ctx, bx, by, boxW, boxH, 15);
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 2;
  roundRect(ctx, bx, by, boxW, boxH, 15);
  ctx.stroke();

  // Emoji
  ctx.font = `${boxH * 0.5}px Georgia`;
  ctx.textAlign = 'center';
  ctx.fillText(s.emoji, bx + 40, by + boxH * 0.65);

  // Text
  ctx.fillStyle = '#FFD700';
  ctx.font = `bold ${W * 0.016}px Georgia`;
  ctx.textAlign = 'left';
  ctx.fillText('🏆 New Sticker!', bx + 70, by + 25);
  ctx.fillStyle = '#FFE4C4';
  ctx.font = `${W * 0.015}px Georgia`;
  ctx.fillText(s.name, bx + 70, by + 48);

  ctx.restore();
}

function drawStickerBook(ctx, time) {
  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, H);

  grad.addColorStop(1, '#2d1b4e');

  // Count
  ctx.fillStyle = '#C8A8E8';
  ctx.font = `${W * 0.015}px Georgia`;
  ctx.fillText(`${game.earnedStickers.length} / ${STICKER_DEFS.length} Stickers`, W / 2, H * 0.08);

  // Category tabs
  const tabW = W / STICKER_CATS.length;
  const tabY = H * 0.1;
  const tabH = H * 0.06;
  STICKER_CATS.forEach((cat, i) => {
    const tx = i * tabW;
    ctx.fillStyle = stickerBookTab === i ? 'rgba(155,89,182,0.6)' : 'rgba(50,30,80,0.5)';
    ctx.fillRect(tx, tabY, tabW - 2, tabH);
    if (stickerBookTab === i) {
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(tx, tabY + tabH - 3, tabW - 2, 3);
    }
    ctx.fillStyle = stickerBookTab === i ? '#FFE4C4' : '#888';
    ctx.font = `${W * 0.013}px Georgia`;
    ctx.textAlign = 'center';
    ctx.fillText(`${cat.emoji} ${cat.name}`, tx + tabW / 2, tabY + tabH * 0.65);
  });

  // Sticker grid
  const catId = STICKER_CATS[stickerBookTab].id;
  const catStickers = STICKER_DEFS.filter(s => s.cat === catId);
  const gridTop = tabY + tabH + 15;
  const cols = Math.max(3, Math.min(5, Math.floor(W / 90)));
  const cellW = (W - 30) / cols;
  const cellH = cellW * 1.1;

  catStickers.forEach((s, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const cx = 15 + col * cellW;
    const cy = gridTop + row * cellH;
    if (cy > H - 50) return; // clip

    const earned = game.earnedStickers.includes(s.id);

    // Card background
    ctx.fillStyle = earned ? 'rgba(60,30,90,0.7)' : 'rgba(30,20,40,0.5)';
    roundRect(ctx, cx + 3, cy + 3, cellW - 6, cellH - 6, 10);
    ctx.fill();

    if (earned) {
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 1.5;
      roundRect(ctx, cx + 3, cy + 3, cellW - 6, cellH - 6, 10);
      ctx.stroke();
    }

    // Emoji or lock
    ctx.textAlign = 'center';
    if (earned) {
      ctx.font = `${cellW * 0.4}px Georgia`;
      ctx.fillText(s.emoji, cx + cellW / 2, cy + cellH * 0.4);
      ctx.fillStyle = '#FFE4C4';
      ctx.font = `${Math.max(9, W * 0.011)}px Georgia`;
      ctx.fillText(s.name, cx + cellW / 2, cy + cellH * 0.7);
    } else {
      ctx.globalAlpha = 0.3;
      ctx.font = `${cellW * 0.35}px Georgia`;
      ctx.fillStyle = '#666';
      ctx.fillText('❓', cx + cellW / 2, cy + cellH * 0.4);
      ctx.font = `${Math.max(8, W * 0.01)}px Georgia`;
      ctx.fillText('???', cx + cellW / 2, cy + cellH * 0.7);
      ctx.globalAlpha = 1;
    }
  });

  // Back button
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  roundRect(ctx, 10, H - 50, 100, 38, 8);
  ctx.fill();
  ctx.fillStyle = '#FFE4C4';
  ctx.font = `${W * 0.018}px Georgia`;
  ctx.textAlign = 'center';
  ctx.fillText('← Back', 60, H - 25);
}

function handleStickerBookTap(x, y) {
  // Category tabs
  const tabW = W / STICKER_CATS.length;
  const tabY = H * 0.1;
  const tabH = H * 0.06;
  if (y >= tabY && y <= tabY + tabH) {
    const idx = Math.floor(x / tabW);
    if (idx >= 0 && idx < STICKER_CATS.length) {
      stickerBookTab = idx;
      playClick();
      return;
    }
  }

  // Back button
  if (x >= 10 && x <= 110 && y >= H - 50 && y <= H - 12) {
    playClick();
    state = GameState.STAGE_SELECT;
    stateTime = 0;
    return;
  }

  // Tap on a sticker to show description
  const catId = STICKER_CATS[stickerBookTab].id;
  const catStickers = STICKER_DEFS.filter(s => s.cat === catId);
  const gridTop = tabY + tabH + 15;
  const cols = Math.max(3, Math.min(5, Math.floor(W / 90)));
  const cellW = (W - 30) / cols;
  const cellH = cellW * 1.1;

  catStickers.forEach((s, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const cx = 15 + col * cellW;
    const cy = gridTop + row * cellH;

    if (x >= cx && x <= cx + cellW && y >= cy && y <= cy + cellH) {
      const earned = game.earnedStickers.includes(s.id);
      if (earned) {
        showSpeechBubble(`${s.emoji} ${s.name}\n${s.desc}`, W / 2, H * 0.5, 3);
      } else {
        showSpeechBubble(`??? — ${s.desc}`, W / 2, H * 0.5, 2);
      }
      playClick();
    }
  });
}

// ============================================================
// GAME COMPLETE (FINALE / CREDITS)
// ============================================================
let finaleScrollY = 0;

function drawGameComplete(ctx, time) {
  // Sunset/celebration gradient background
  const phase = Math.min(1, stateTime / 4);
  const topColor = `rgb(${Math.floor(25 + 60 * phase)}, ${Math.floor(10 + 30 * phase)}, ${Math.floor(60 + 40 * phase)})`;
  const midColor = `rgb(${Math.floor(180 * phase)}, ${Math.floor(100 * phase)}, ${Math.floor(50 * phase)})`;
  const botColor = `rgb(${Math.floor(40 + 60 * phase)}, ${Math.floor(120 * phase)}, ${Math.floor(60 * phase)})`;

  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, topColor);
  grad.addColorStop(0.5, midColor);
  grad.addColorStop(1, botColor);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars in the sky
  if (stateTime > 2) {
    const starAlpha = Math.min(0.8, (stateTime - 2) * 0.2);
    ctx.fillStyle = `rgba(255,255,255,${starAlpha})`;
    for (let i = 0; i < 30; i++) {
      const sx = ((i * 137.5) % W);
      const sy = ((i * 73.1) % (H * 0.4));
      const sz = 1 + Math.sin(time * 2 + i) * 0.5;
      ctx.beginPath();
      ctx.arc(sx, sy, sz, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Celebration particles
  if (stateTime < 8 && Math.random() < 0.2) {
    spawnParticles(Math.random() * W, Math.random() * H * 0.3, 2, {
      type: 'sparkle', color: ['#FFD700', '#FF69B4', '#87CEEB', '#2ECC71', '#FF9F43'][Math.floor(Math.random() * 5)],
      life: 3, spread: 3,
    });
  }
  updateParticles(dt);
  drawParticles(ctx);

  // Content card
  const cardW = Math.min(W * 0.85, 500);
  const cardH = H * 0.75;
  const cx = W / 2 - cardW / 2;
  const cy = H * 0.08;

  ctx.fillStyle = 'rgba(20,10,40,0.85)';
  roundRect(ctx, cx, cy, cardW, cardH, 20);
  ctx.fill();
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 3;
  roundRect(ctx, cx, cy, cardW, cardH, 20);
  ctx.stroke();

  ctx.save();
  ctx.beginPath();
  ctx.rect(cx, cy, cardW, cardH);
  ctx.clip();

  const contentY = cy + 30 - finaleScrollY;
  ctx.textAlign = 'center';
  const centerX = W / 2;

  // Crown emoji
  if (stateTime > 0.5) {
    ctx.font = `${W * 0.08}px Georgia`;
    ctx.fillText('👑', centerX, contentY + 50);
  }

  // Title
  if (stateTime > 1) {
    ctx.fillStyle = '#FFD700';
    ctx.font = `bold ${W * 0.032}px Georgia`;
    ctx.fillText('The Forgotten Realms', centerX, contentY + 95);
    ctx.fillText('Are Saved!', centerX, contentY + 130);
  }

  // Crowned protector message
  if (stateTime > 2) {
    ctx.fillStyle = '#FFE4C4';
    ctx.font = `${W * 0.02}px Georgia`;
    ctx.fillText(`${player.title} ${player.name}`, centerX, contentY + 175);
    ctx.fillStyle = '#C8A8E8';
    ctx.font = `italic ${W * 0.016}px Georgia`;
    ctx.fillText('Crowned Protector of the Forgotten Realms', centerX, contentY + 200);
  }

  // Stats
  if (stateTime > 3) {
    const statsY = contentY + 240;
    ctx.fillStyle = '#888';
    ctx.font = `${W * 0.013}px Georgia`;
    ctx.fillText('— Your Journey —', centerX, statsY);

    ctx.fillStyle = '#FFE4C4';
    ctx.font = `${W * 0.016}px Georgia`;
    const totalMin = Math.floor(game.totalTime / 60);
    const totalSec = Math.floor(game.totalTime % 60);
    const timeStr = totalMin > 0 ? `${totalMin}m ${totalSec}s` : `${totalSec}s`;

    const stats = [
      [`🧩 Puzzles Solved: ${game.puzzlesSolved}`, statsY + 30],
      [`🦊 Companions Found: ${game.companions.length}/4`, statsY + 55],
      [`💎 Collectibles: ${game.collectiblesFound}`, statsY + 80],
      [`⏱ Time Played: ${timeStr}`, statsY + 105],
      [`📜 Levels Completed: ${game.completedLevels.length}/43`, statsY + 130],
    ];
    stats.forEach(([text, sy]) => ctx.fillText(text, centerX, sy));

    // Companions list
    const compY = statsY + 165;
    ctx.fillStyle = '#888';
    ctx.font = `${W * 0.013}px Georgia`;
    ctx.fillText('— Companions —', centerX, compY);

    const compNames = { fox: '🦊 Ember the Fox', unicorn: '🦄 Starlight the Unicorn', dragon: '🐉 Spark the Dragon', owl: '🦉 Sage the Owl' };
    game.companions.forEach((c, i) => {
      ctx.fillStyle = '#C8A8E8';
      ctx.font = `${W * 0.015}px Georgia`;
      ctx.fillText(compNames[c] || c, centerX, compY + 25 + i * 25);
    });

    // Credits
    const credY = compY + 25 + game.companions.length * 25 + 30;
    ctx.fillStyle = '#666';
    ctx.font = `${W * 0.012}px Georgia`;
    ctx.fillText('— Credits —', centerX, credY);
    ctx.fillStyle = '#999';
    ctx.font = `${W * 0.013}px Georgia`;
    ctx.fillText('Meadow Kingdom 2: The Forgotten Realms', centerX, credY + 25);
    ctx.fillText('Made with love by the Hive', centerX, credY + 45);
    ctx.fillStyle = '#FFD700';
    ctx.font = `italic ${W * 0.014}px Georgia`;
    ctx.fillText('Thank you for playing! ✨', centerX, credY + 75);
  }

  ctx.restore();

  // Play Again button
  if (stateTime > 5) {
    const btnY = cy + cardH + 15;
    const alpha = Math.min(1, (stateTime - 5) * 2);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(155,89,182,0.9)';
    roundRect(ctx, W / 2 - 100, btnY, 200, 45, 10);
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = `bold ${W * 0.02}px Georgia`;
    ctx.textAlign = 'center';
    ctx.fillText('Play Again', W / 2, btnY + 30);
    ctx.globalAlpha = 1;
  }
}

function handleGameCompleteTap(x, y) {
  if (stateTime < 5) return;
  const cardH = H * 0.75;
  const cy = H * 0.08;
  const btnY = cy + cardH + 15;
  if (x >= W / 2 - 100 && x <= W / 2 + 100 && y >= btnY && y <= btnY + 45) {
    playClick();
    state = GameState.STAGE_SELECT;
    stateTime = 0;
    finaleScrollY = 0;
  }
  // Allow scrolling inside the card
  // (handled by scroll event below)
}

// ============================================================
// MAIN INPUT HANDLER
// ============================================================
function handleTap(x, y) {
  ensureAudio();

  switch (state) {
    case GameState.TITLE:
      handleTitleTap(x, y);
      break;
    case GameState.CHARACTER_CREATE:
      handleCharCreateTap(x, y);
      break;
    case GameState.STAGE_SELECT:
      handleStageSelectTap(x, y);
      break;
    case GameState.LEVEL_SELECT:
      handleLevelSelectTap(x, y);
      break;
    case GameState.PLAYING:
      // Pause button check
      if (y < 35 && x > W / 2 - 25 && x < W / 2 + 25) {
        state = GameState.PAUSE;
        return;
      }
      // Try puzzle interaction first
      if (handlePuzzleTap(x, y)) return;
      // Then collectible pickup
      if (currentLevel) {
        for (const o of currentLevel.objects) {
          if (o.type === 'collectible' && !o.collected) {
            let ox, oy;
            if (currentLevel.mode === LevelMode.SIDESCROLL) {
              ox = o.x - currentLevel.scrollX;
              oy = o.y;
            } else {
              ox = o.gridX * currentLevel.tileSize + currentLevel.tileSize / 2 - currentLevel.camX;
              oy = o.gridY * currentLevel.tileSize + currentLevel.tileSize / 2 - currentLevel.camY;
            }
            if (Math.hypot(x - ox, y - oy) < 25) {
              o.collected = true;
              game.collectiblesFound = (game.collectiblesFound || 0) + 1;
              playChime(7, 0.4, 0.2);
              spawnParticles(x, y, 12, { type: 'sparkle', color: o.color || '#FFD700', life: 1.5 });
              const names = { golden_acorn: 'Golden Acorn', crystal_shard: 'Crystal Shard', cloud_feather: 'Cloud Feather', bronze_cog: 'Bronze Cog', paint_gem: 'Paint Gem', ice_crystal: 'Ice Crystal', pearl: 'Pearl', shadow_shard: 'Shadow Shard', ancient_scroll: 'Ancient Scroll', spark_stone: 'Spark Stone', time_seed: 'Time Seed', celebration_star: 'Celebration Star', ember_coal: 'Ember Coal', glowing_spore: 'Glowing Spore', star_fragment: 'Star Fragment', iron_nugget: 'Iron Nugget', coral_pearl: 'Coral Pearl', dream_shard: 'Dream Shard', honey_drop: 'Honey Drop', aurora_crystal: 'Aurora Crystal', drama_mask: 'Drama Mask', volcanic_ruby: 'Volcanic Ruby', sky_scale: 'Sky Scale', eternal_petal: 'Eternal Petal' };
              showSpeechBubble(`Found a ${names[o.subtype] || 'treasure'}!`, ox, oy - 40, 2);
              checkStickerUnlocks();
              return;
            }
          }
        }
      }
      // Flower tap — play fun sounds
      if (currentLevel && currentLevel.decorations) {
        const sx = currentLevel.mode === LevelMode.SIDESCROLL ? currentLevel.scrollX : 0;
        for (const d of currentLevel.decorations) {
          if (d.type !== 'flower') continue;
          const fx = d.x - sx;
          const fy = H * GROUND - d.size * 2.2;
          if (Math.hypot(x - fx, y - fy) < d.size * 1.5) {
            d.bounceTimer = 0.6;
            // Musical note based on flower — pentatonic scale for kid-friendly sound
            const notes = [0, 2, 4, 7, 9, 12, 14, 16, 19, 21, 24, 26];
            const noteIdx = d.note !== undefined ? d.note : Math.floor(Math.random() * 12);
            playChime(notes[noteIdx], 0.3, 0.25);
            spawnParticles(fx, fy, 5, { type: 'sparkle', color: d.color, life: 0.8, spread: 2 });
            // Don't return — still allow movement to the flower's position
            break;
          }
        }
      }
      // Movement
      if (currentLevel) {
        if (currentLevel.mode === LevelMode.SIDESCROLL) {
          player.targetX = x + currentLevel.scrollX;
          player.targetY = H * GROUND - 5; // ground-locked in side-scroll
        } else {
          player.targetX = x + currentLevel.camX;
          player.targetY = y + currentLevel.camY;
        }
      }
      break;
    case GameState.LEVEL_COMPLETE:
      handleLevelCompleteTap(x, y);
      break;
    case GameState.STAGE_COMPLETE:
      handleStageCompleteTap(x, y);
      break;
    case GameState.PARENT_GATE:
      handleParentGateTap(x, y);
      break;
    case GameState.PAUSE:
      handlePauseTap(x, y);
      break;
    case GameState.GAME_COMPLETE:
      handleGameCompleteTap(x, y);
      break;
    case GameState.STICKER_BOOK:
      handleStickerBookTap(x, y);
      break;
  }
}

// Touch and mouse input
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  handleTap(t.clientX - rect.left, t.clientY - rect.top);
}, { passive: false });

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  handleTap(e.clientX - rect.left, e.clientY - rect.top);
});

// Scroll for stage select
canvas.addEventListener('wheel', e => {
  if (state === GameState.STAGE_SELECT) {
    handleStageSelectScroll(e.deltaY);
  }
  if (state === GameState.GAME_COMPLETE) {
    finaleScrollY = Math.max(0, finaleScrollY + e.deltaY * 0.5);
  }
});

let touchStartY = 0;
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state === GameState.STAGE_SELECT) {
    const t = e.touches[0];
    handleStageSelectScroll(touchStartY - t.clientY);
    touchStartY = t.clientY;
  }
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });

// Keyboard input for name entry
document.addEventListener('keydown', e => {
  if (state === GameState.CHARACTER_CREATE && charCreate.step === 0) {
    if (e.key === 'Backspace') {
      charCreate.nameInput = charCreate.nameInput.slice(0, -1);
      player.name = charCreate.nameInput || 'Hero';
    } else if (e.key.length === 1 && charCreate.nameInput.length < 20) {
      charCreate.nameInput += e.key;
      player.name = charCreate.nameInput;
    }
  }
});

// WASD / Arrow key movement
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }
});
document.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

// ============================================================
// MAIN GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  if (!prevTime) prevTime = timestamp;
  dt = Math.min(0.05, (timestamp - prevTime) / 1000);
  prevTime = timestamp;
  stateTime += dt;
  game.totalTime += dt;

  const time = timestamp / 1000;

  ctx.clearRect(0, 0, W, H);

  switch (state) {
    case GameState.TITLE:
      drawTitle(ctx, time);
      break;
    case GameState.CHARACTER_CREATE:
      charCreate.animTimer += dt;
      drawCharacterCreate(ctx, time);
      break;
    case GameState.STAGE_SELECT:
      drawStageSelect(ctx, time);
      break;
    case GameState.LEVEL_SELECT:
      drawLevelSelect(ctx, time);
      break;
    case GameState.PLAYING:
      if (currentLevel) {
        if (currentLevel.mode === LevelMode.SIDESCROLL) {
          updateSideScrollLevel(dt, time);
          drawSideScrollLevel(ctx, time);
        } else {
          updateTopDownLevel(dt, time);
          drawTopDownLevel(ctx, time);
        }
      }
      break;
    case GameState.LEVEL_COMPLETE:
      if (currentLevel) {
        if (currentLevel.mode === LevelMode.SIDESCROLL) {
          drawSideScrollLevel(ctx, time);
        } else {
          drawTopDownLevel(ctx, time);
        }
      }
      drawLevelComplete(ctx, time);
      updateParticles(dt);
      break;
    case GameState.STAGE_COMPLETE:
      drawStageComplete(ctx, time);
      updateParticles(dt);
      break;
    case GameState.PARENT_GATE:
      drawParentGate(ctx, time);
      break;
    case GameState.PAUSE:
      if (currentLevel) {
        if (currentLevel.mode === LevelMode.SIDESCROLL) {
          drawSideScrollLevel(ctx, time);
        } else {
          drawTopDownLevel(ctx, time);
        }
      }
      drawPause(ctx, time);
      break;
    case GameState.GAME_COMPLETE:
      drawGameComplete(ctx, time);
      break;
    case GameState.STICKER_BOOK:
      updateBubbles(dt);
      drawStickerBook(ctx, time);
      drawBubbles(ctx);
      break;
  }

  // Sticker notification overlay (shows on any screen)
  updateStickerNotify(dt);
  drawStickerNotify(ctx);

  // Periodic sticker checks (time-based stickers, every ~30s)
  if (Math.floor(game.totalTime / 30) !== Math.floor((game.totalTime - dt) / 30)) {
    checkStickerUnlocks();
  }

  requestAnimationFrame(gameLoop);
}

// ============================================================
// INIT
// ============================================================

// Stripe unlock: check URL params on return from payment
(function checkStripeReturn() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('unlock') === 'success') {
    // Payment successful — unlock premium
    loadGame();
    game.premiumUnlocked = true;
    for (let i = 3; i < STAGES.length; i++) {
      if (!game.unlockedStages.includes(i)) game.unlockedStages.push(i);
    }
    saveGame();
    // Clean URL so refresh doesn't re-trigger
    window.history.replaceState({}, '', window.location.pathname);
    // Show celebration on next frame
    setTimeout(() => {
      showSpeechBubble('🎉 All realms unlocked! Thank you!', W / 2, H * 0.3, 5);
    }, 500);
  }
})();

initParentGate();
requestAnimationFrame(gameLoop);

</script>
